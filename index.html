const CASOS=[
{id:'c01',mod:'M1',titulo:'El DNU que reformó el Código Penal',
relato:`<p>El Poder Ejecutivo Nacional, presionado por la opinión pública tras un aumento en los delitos contra la propiedad, emitió un <strong>Decreto de Necesidad y Urgencia (DNU)</strong> modificando el Código Penal: elevó las penas mínimas para el robo simple y agravado, e incorporó una nueva figura de "robo reiterado" con penas más severas. El decreto fue publicado en el Boletín Oficial y comenzó a aplicarse en todo el país. Una semana después, el Congreso se encontraba en sesiones ordinarias. Un abogado defensor planteó la inconstitucionalidad del decreto en el juicio de su cliente, imputado bajo las nuevas penas.</p>`,
preguntas:[
{text:'¿Por qué el DNU que modifica el Código Penal es inconstitucional?',opts:['Porque los DNU requieren mayoría de 2/3 del Congreso para ser válidos','Porque el art. 99 inc. 3 CN prohíbe expresamente que los DNU regulen materia penal','Porque el Código Penal solo puede ser modificado por una Convención Constituyente','Porque el Poder Ejecutivo no tiene iniciativa legislativa en materia penal'],c:1,exp:'El art. 99 inc. 3 CN es categórico: los DNU están prohibidos en materia penal, tributaria, electoral y régimen de partidos políticos. Esta prohibición es absoluta, sin importar si hay urgencia. Además, el hecho de que el Congreso estuviera en sesiones ordinarias refuerza la inconstitucionalidad: no había imposibilidad de tramitar la ley por vía ordinaria.'},
{text:'El abogado plantea la inconstitucionalidad en el juicio de su cliente. ¿Qué tipo de control de constitucionalidad ejerce?',opts:['Control concentrado por acción directa ante la Corte Suprema','Control difuso por vía indirecta (incidental)','Control de oficio por el Tribunal Constitucional','Control erga omnes con efectos sobre todos los imputados bajo esa norma'],c:1,exp:'Es control difuso (cualquier juez puede ejercerlo) por vía indirecta: la inconstitucionalidad se alega como defensa dentro de un proceso penal (cuyo objeto principal es la condena del imputado, no la inconstitucionalidad). Es la vía más común en el sistema argentino.'},
{text:'Si el juez declara inconstitucional el DNU, ¿qué efecto tendrá esa decisión?',opts:['El DNU queda derogado para todos en el país','Solo beneficia al imputado en ese caso concreto (efecto inter partes)','El Congreso debe votar para confirmar la inconstitucionalidad','El Poder Ejecutivo debe retirar el decreto dentro de 30 días hábiles'],c:1,exp:'En el sistema difuso argentino, la regla general es el efecto inter partes: la declaración de inconstitucionalidad solo aplica al caso concreto y no deroga la norma para el resto de los ciudadanos. Otros imputados deberán plantear la misma cuestión en sus propios juicios.'}
]},

{id:'c02',mod:'M1',titulo:'La protección del denunciante ambiental',
relato:`<p>Laura trabaja en una empresa química y descubre que la planta vierte residuos tóxicos directamente al río local. Denuncia la situación ante las autoridades ambientales y a los medios de comunicación. Como represalia, la empresa la despide y la demanda por divulgación de información confidencial. Un grupo de vecinos afectados por la contaminación del río quiere saber qué acciones constitucionales tienen disponibles. Laura, por su parte, quiere saber si tiene protección constitucional específica.</p>`,
preguntas:[
{text:'¿Qué derecho constitucional invocaron los vecinos afectados por la contaminación del río?',opts:['El derecho a la propiedad del agua (art. 17 CN)','El derecho a un ambiente sano y equilibrado (art. 41 CN)','El derecho de peticionar a las autoridades (art. 14 CN)','El derecho a la libre circulación en el territorio nacional (art. 14 CN)'],c:1,exp:'El art. 41 CN establece el derecho de todos los habitantes a un ambiente sano, equilibrado y apto para el desarrollo humano. El daño ambiental genera prioritariamente la obligación de recomponer, y las autoridades tienen el deber de proteger este derecho. Es un derecho de tercera generación (colectivo).'},
{text:'¿Qué acción constitucional pueden iniciar los vecinos para proteger el ambiente de forma urgente?',opts:['Hábeas corpus preventivo','Amparo colectivo (art. 43, 2.° párrafo CN)','Acción declarativa de certeza','Recurso extraordinario federal ante la Corte Suprema'],c:1,exp:'El art. 43 CN en su segundo párrafo habilita el amparo colectivo para la protección del ambiente, de la competencia, del usuario y del consumidor, y de derechos de incidencia colectiva en general. Pueden promoverlo el afectado, el Defensor del Pueblo y las asociaciones registradas. Es la vía idónea para una protección urgente y colectiva.'},
{text:'La demanda de la empresa contra Laura por "divulgación de información confidencial" ¿podría afectar qué derecho constitucional de Laura?',opts:['El derecho a trabajar y ejercer industria lícita (art. 14 CN)','El derecho de publicar ideas por la prensa sin censura previa y el derecho a peticionar a las autoridades (art. 14 CN)','El derecho a la intimidad (art. 19 CN)','El derecho de asociarse con fines útiles (art. 14 CN)'],c:1,exp:'La denuncia de Laura ante autoridades y medios está amparada por el derecho a publicar ideas por la prensa sin censura previa y el derecho de peticionar a las autoridades (art. 14 CN). Una condena civil por "divulgación de información" que en realidad es denuncia de ilícitos podría configurar una censura indirecta inconstitucional.'}
]},

{id:'c03',mod:'M2',titulo:'La legítima defensa y el exceso',
relato:`<p>Carlos regresa a su casa de noche y sorprende a un intruso que está robando sus pertenencias. El intruso, al verse descubierto, saca un cuchillo y amenaza a Carlos. Carlos, en estado de pánico, toma el arma de fuego reglamentaria que guarda en su habitación y dispara dos veces al intruso: la primera bala lo hiere en el brazo, la segunda le causa la muerte. El intruso pesaba 60 kg y era el único agresor. Carlos es imputado por "homicidio simple". Su defensor alega legítima defensa.</p>`,
preguntas:[
{text:'¿Se cumplen los requisitos de la legítima defensa en este caso?',opts:['No, porque Carlos tenía una opción menos letal (escapar de la habitación)','Sí, en principio: hay agresión ilegítima (el intruso armado amenaza), necesidad de la defensa (el intruso tenía cuchillo) y falta de provocación suficiente','No, porque el arma de fuego es desproporcionada ante un cuchillo','Sí, pero solo si Carlos intentó primero reducir al intruso sin usar el arma'],c:1,exp:'La legítima defensa requiere agresión ilegítima (el intruso amenazó con cuchillo), necesidad racional del medio empleado (la ley no exige igualdad de medios sino racionalidad en la defensa frente a la amenaza concreta) y falta de provocación suficiente (Carlos estaba en su casa). En principio todos los requisitos se cumplen. El juez evaluará si el segundo disparo fue también necesario.'},
{text:'Si el juez considera que el primer disparo fue justificado pero el segundo fue un exceso, ¿cómo se resuelve?',opts:['Carlos es absuelto por legítima defensa completa','Carlos es condenado por homicidio doloso con la pena máxima','Puede configurarse el exceso en la legítima defensa (art. 35 CP), que se penaliza con la escala del homicidio culposo','Carlos responde por lesiones graves por el primer disparo y por homicidio doloso por el segundo'],c:2,exp:'El art. 35 CP establece que cuando se exceden los límites de la legítima defensa, se aplica la pena fijada para el delito culposo. Así, si el primer disparo fue justificado pero el segundo fue un exceso (el agresor ya estaba neutralizado), la conducta total podría calificarse como homicidio con exceso en la legítima defensa, con la escala penal del homicidio culposo.'},
{text:'¿En qué categoría de la teoría del delito opera la legítima defensa?',opts:['En la acción: elimina la voluntad de Carlos','En la tipicidad: la conducta no es típica','En la antijuridicidad: es una causa de justificación que elimina la contradicción con el ordenamiento','En la culpabilidad: Carlos no puede ser reprochado por actuar así'],c:2,exp:'Las causas de justificación (legítima defensa, estado de necesidad, cumplimiento de un deber legal) operan en el plano de la antijuridicidad. La conducta de Carlos ES típica (matar a una persona encuadra en el homicidio), pero el ordenamiento jurídico la autoriza bajo las circunstancias de la legítima defensa. Esto elimina la contradicción con el derecho.'}
]},

{id:'c04',mod:'M2',titulo:'El robo planificado y la participación',
relato:`<p>Ana, Beatriz y Carlos planifican asaltar una joyería. Ana diseña el plan y coordina la operación desde el exterior. Beatriz ingresa al local y reduce al empleado amenazándolo con un arma de fuego. Carlos espera afuera con el auto en marcha para facilitar la huida. Durante el asalto, Beatriz actúa imprevistamente y golpea al empleado con el arma, causándole lesiones graves. Ana y Carlos no sabían que Beatriz llevaría el arma ni que usaría violencia física. Al terminar, el botín es de $500.000 en joyas.</p>`,
preguntas:[
{text:'¿Cuál es la participación de Ana, quien planificó la operación desde afuera sin ingresar al local?',opts:['No responde porque no estuvo presente en la ejecución','Es cómplice no necesaria porque solo planificó','Es coautora o instigadora: su rol de planificación y coordinación puede encuadrar en la coautoría por dominio funcional del hecho','Es solo una partícipe secundaria porque no tocó las joyas'],c:2,exp:'Ana puede ser coautora por dominio funcional del hecho: aunque no ejecuta materialmente, tiene el dominio de la organización y sin su plan el robo no hubiera existido. Alternativamente, si determinó directamente a Beatriz y Carlos a cometer el robo, puede ser instigadora. En ambos casos responde con la misma escala penal que el autor directo.'},
{text:'Respecto a las lesiones graves causadas por Beatriz, ¿responden Ana y Carlos por ellas?',opts:['Sí, siempre responden por todo lo que haga cualquier copartícipe','No, porque las lesiones fueron un acto imprevisible de Beatriz que excede el plan común','Sí, pero solo si el plan original incluía el uso de violencia física','No, porque Ana y Carlos no estaban presentes cuando ocurrieron las lesiones'],c:1,exp:'En la participación criminal, los copartícipes solo responden por los hechos que están dentro del plan común acordado o que eran previsibles dentro de ese plan. Las lesiones graves fueron consecuencia de un exceso imprevisto e imprevisible de Beatriz. Ana y Carlos responden por el robo planificado (incluyendo la intimidación), pero no por el exceso doloso de Beatriz en las lesiones.'},
{text:'Carlos, que esperó con el auto en marcha, ¿qué tipo de participación tiene?',opts:['Es coautor porque sin él no hubiera habido escape posible','Es cómplice necesario si su aporte fue indispensable para el plan (ej. no había otra forma de huir), o cómplice no necesario si pudo reemplazarse su rol','Es encubridor porque actuó después de que el delito ya había comenzado','No responde porque solo condujo un vehículo, actividad lícita en sí misma'],c:1,exp:'La participación de Carlos (conductor de la huida) puede calificarse como complicidad necesaria (si el plan dependía de ese escape específico y era imposible reemplazarlo) o no necesaria (si el rol era sustituible). La distinción es crucial porque la complicidad necesaria tiene la misma escala penal que el autor, mientras que la no necesaria tiene escala reducida.'}
]},

{id:'c05',mod:'M3',titulo:'El contrato con dolo y la simulación',
relato:`<p>Ramón vende su automóvil a Sara. Para convencerla de pagar $5.000.000 en lugar del valor de mercado de $2.500.000, Ramón le muestra un informe de tasación falso que hizo confeccionar por un conocido. Sara, confiando en el informe, paga $5.000.000. Tiempo después descubre el engaño. Paralelamente, el hermano de Ramón, Diego, vendió su casa a un amigo por un precio irrisorio de $1 para evitar que sus acreedores la ejecutaran. El amigo de Diego sabía del propósito.</p>`,
preguntas:[
{text:'¿Qué vicio afecta el contrato de compraventa entre Ramón y Sara?',opts:['Error esencial sobre el valor de mercado del auto','Dolo esencial: Ramón usó un informe falso para determinar a Sara a pagar más','Lesión: aprovechó la inexperiencia de Sara sobre el mercado automotor','Simulación relativa: el precio real era otro'],c:1,exp:'Hay dolo esencial: Ramón usó un artificio (informe de tasación falso, confeccionado deliberadamente) para inducir a Sara a celebrar el contrato en condiciones que no hubiera aceptado si hubiera conocido la realidad. Reúne los requisitos: grave (informe profesional falso), determinante (Sara no hubiera pagado ese precio), causó daño relevante (pagó el doble) y no fue recíproco.'},
{text:'¿Qué acción tiene Sara y qué puede obtener?',opts:['Solo puede pedir la devolución del excedente de precio pagado','Puede pedir la nulidad del contrato y la indemnización de daños y perjuicios','Solo puede denunciar penalmente a Ramón por estafa','Puede pedir únicamente la rebaja del precio al valor de mercado'],c:1,exp:'El dolo esencial produce la nulidad del acto (art. 272 CCyC). Sara puede pedir la nulidad del contrato de compraventa y, adicionalmente, la reparación de los daños y perjuicios sufridos. Si el dolo provino de un tercero (el que confeccionó el informe falso) con conocimiento de Ramón, ambos responden solidariamente.'},
{text:'La venta de Diego a su amigo por $1 para eludir acreedores, ¿qué remedio tienen los acreedores?',opts:['Nada, ya que la venta fue voluntaria y libre entre las partes','Pueden iniciar la acción de inoponibilidad (acción pauliana) para que ese acto no les sea oponible','Solo pueden demandar a Diego por daños y perjuicios','Pueden pedir la nulidad de la venta por simulación absoluta'],c:1,exp:'Los acreedores de Diego pueden ejercer la acción de inoponibilidad (art. 338 CCyC, antes llamada "acción pauliana"): requiere que el acto haya perjudicado al acreedor, que Diego conocía que perjudicaba a sus acreedores, y que el adquirente (el amigo) conociera la situación de insolvencia (en actos a título oneroso). El efecto es que el acto no les es oponible: pueden ejecutar la casa como si la venta no hubiera existido.'}
]},

{id:'c06',mod:'M3',titulo:'El contrato de locación y el desalojo',
relato:`<p>Marcela alquila un departamento a Juan para vivienda. El contrato fue firmado en enero de 2024 bajo las disposiciones de la Ley 27.737, por un plazo de 2 años. A los 8 meses, Juan deja de pagar el alquiler sin justificación. Marcela quiere recuperar su departamento. Adicionalmente, al momento de restituir el inmueble (si eso ocurriera), Juan pretende quedarse con un lavarropas automático que instaló durante el contrato, argumentando que es "una mejora" que realizó a su costo.</p>`,
preguntas:[
{text:'¿Cuál es el plazo mínimo legal del contrato de locación firmado en 2024?',opts:['3 años (Ley 27.551)','2 años (Ley 27.737)','1 año','6 meses, si las partes lo acordaron así'],c:1,exp:'La Ley 27.737 (vigente desde 2024) redujo el plazo mínimo legal de los contratos de locación a 2 años, para todas las locaciones incluyendo las de destino habitacional. La ley anterior (Ley 27.551) fijaba el mínimo en 3 años. El plazo máximo para destino habitacional sigue siendo 20 años.'},
{text:'Ante la falta de pago, ¿qué acción tiene Marcela para recuperar el inmueble?',opts:['Solo puede resolver el contrato de pleno derecho sin notificación previa','Debe esperar a que venza el plazo del contrato para iniciar el desalojo','Puede aplicar la cláusula resolutoria implícita: intimar a Juan para que pague en un plazo no menor a 15 días, y ante el incumplimiento, resolver el contrato e iniciar el desalojo','Solo puede pedir la resolución si hay cláusula expresa de resolución por falta de pago'],c:2,exp:'La cláusula resolutoria implícita (art. 1087 CCyC) establece que en los contratos bilaterales el incumplimiento da derecho a la parte cumplidora a resolver. Para la locación, Marcela debe intimar a Juan concediendo un plazo no menor a 15 días. Si Juan no paga, Marcela puede declarar resuelto el contrato y luego iniciar el proceso de desalojo judicial.'},
{text:'¿Puede Juan retener el lavarropas que instaló durante el contrato?',opts:['Sí, las mejoras útiles incorporadas por el locatario son de su propiedad y puede retirarlas al terminar el contrato','Solo puede retirarlo si no daña el inmueble al hacerlo y si lo instaló sin obligación legal de hacerlo','No, todo lo que se incorpora al inmueble durante la locación pertenece al locador','No, porque los bienes muebles instalados en el inmueble se convierten en inmuebles por accesión'],c:1,exp:'El locatario puede retirar las mejoras que haya introducido si no causa daño al inmueble y si las instaló sin estar legalmente obligado a hacerlo (mejoras voluntarias, no las que eran obligación del locatario). Un lavarropas es un bien mueble que no se adhiere permanentemente al inmueble (no es inmueble por accesión), por lo que Juan puede retirarlo si no genera daños al retirarlo.'}
]},

{id:'c07',mod:'M3',titulo:'La persona jurídica y el corrimiento del velo',
relato:`<p>Tres socios constituyeron la sociedad "Construcciones Veloce S.A." para construir edificios. En realidad, usaron la sociedad para contratar trabajadores en negro, no pagar impuestos y evadir obligaciones previsionales, mientras retiraban las ganancias para gastos personales (autos de lujo, vacaciones). Cuando los trabajadores demandaron por aportes no realizados y la AFIP reclamó las deudas impositivas, la sociedad declaró su quiebra sin activos. Los socios argumentan que el patrimonio de la sociedad es independiente del personal y que ellos no responden personalmente.</p>`,
preguntas:[
{text:'¿Puede aplicarse en este caso la inoponibilidad de la personalidad jurídica?',opts:['No, el principio de separación de patrimonios es absoluto y protege siempre a los socios','No, porque la sociedad fue legalmente constituida ante el Registro Público','Sí, porque la personalidad jurídica fue usada para violar la ley (evasión, trabajo en negro) y defraudar derechos de terceros (trabajadores, AFIP)','Solo si se prueba que los socios actuaron de mala fe en todos los contratos de la sociedad'],c:2,exp:'El art. 144 CCyC permite la inoponibilidad (corrimiento del velo societario) cuando la persona jurídica es usada para violar la ley, el orden público, la buena fe o para frustrar derechos de terceros. En este caso, la sociedad fue un mero instrumento para evadir impuestos y defraudar a los trabajadores: encuadra perfectamente en la figura. Los socios responden con su patrimonio personal.'},
{text:'¿Qué efectos tiene la declaración de inoponibilidad de la personalidad jurídica?',opts:['La sociedad queda disuelta automáticamente y los socios responden por todas las deudas desde el inicio','Los actos de la sociedad son nulos, y todos los contratos celebrados quedan sin efecto','La imputación de responsabilidad por los actos fraudulentos recae sobre quienes los realizaron, que responden con su patrimonio personal','Los socios responden solo por el monto de su aporte al capital social'],c:2,exp:'La inoponibilidad no disuelve la sociedad ni anula todos sus actos. Los efectos se limitan a imputar la responsabilidad por los actos fraudulentos a quienes los realizaron (los socios que usaron la sociedad para el fraude). Esos socios responden ilimitadamente con su patrimonio personal por esas obligaciones específicas.'},
{text:'¿El objeto social de una persona jurídica tiene alguna relevancia jurídica?',opts:['No, las personas jurídicas pueden realizar cualquier acto jurídico sin limitación','Sí: la capacidad de derecho de la persona jurídica está limitada por su objeto social; solo puede realizar actos propios de la actividad para la que fue constituida','Solo es relevante para fines impositivos y contables','Sí, pero solo para los actos formales que requieren escritura pública'],c:1,exp:'La capacidad de derecho de la persona jurídica está delimitada por su objeto social (art. 141 CCyC). Solo puede realizar actos que se correspondan con la actividad para la que fue constituida. Los actos ultra vires (que exceden el objeto) pueden ser inoponibles a la sociedad, aunque los terceros de buena fe suelen estar protegidos si no conocían la limitación.'}
]},

{id:'c08',mod:'M4',titulo:'La demanda ante el juez incorrecto',
relato:`<p>Un trabajador de la provincia de Córdoba, que presta servicios para una empresa con sede en Buenos Aires, sufre un accidente laboral. Inicia la demanda por indemnización ante el <strong>Juzgado Federal Civil y Comercial N.° 1 de Córdoba</strong>, argumentando que la empresa tiene contratos con el Estado Nacional. La empresa contesta la demanda sin oponer ninguna excepción, respondiendo el fondo del asunto en detalle. Dos meses después, el juez federal, en el momento de abrir el período de prueba, advierte que el fuero laboral provincial sería el competente.</p>`,
preguntas:[
{text:'¿Puede la empresa, que ya contestó la demanda sin objetar la competencia, ahora alegar la incompetencia del juez federal?',opts:['Sí, la incompetencia puede plantearse en cualquier momento del proceso','No, al no oponer la excepción en la contestación, prorrogó tácitamente la competencia territorial y ya no puede cuestionarla','Depende de si la causa es de competencia federal por razón de materia o solo por razón del territorio','Solo podría alegarla en la etapa recursiva, no durante el proceso de primera instancia'],c:2,exp:'Hay que distinguir dos tipos de competencia. La competencia territorial es prorrogable: si la empresa no opuso la excepción en la contestación, prorrogó tácitamente esa competencia y ya no puede cuestionarla. Sin embargo, si se trata de competencia por razón de la materia (fuero), esta es improrrogable y puede cuestionarse en cualquier momento, incluso de oficio.'},
{text:'¿Puede el juez federal inhibirse de oficio aunque la empresa no haya cuestionado su competencia?',opts:['No, si las partes no cuestionan la competencia, el juez debe seguir entendiendo en la causa','Sí, siempre que la competencia sea por razón de la materia (improrrogable por ser de orden público), el juez debe inhibirse de oficio en cualquier etapa','Solo puede inhibirse antes de que se trabe la litis (antes de contestada la demanda)','No, la inhibición de oficio está prohibida en el derecho procesal argentino'],c:1,exp:'La competencia por razón de la materia es de orden público e improrrogable. El juez tiene la obligación de inhibirse de oficio si advierte su incompetencia en cualquier estado del proceso, aunque las partes no lo hayan cuestionado. Es un presupuesto procesal que el juez debe verificar de oficio.'},
{text:'Si el juez federal se inhibe, ¿qué ocurre con lo actuado hasta ese momento?',opts:['Todo lo actuado es nulo por haberse hecho ante un juez sin competencia','Lo actuado hasta la inhibición conserva su validez; el juez remite las actuaciones al tribunal competente','Las partes deben iniciar nuevamente el proceso desde cero ante el juez competente','El juicio queda suspendido hasta que la Corte Suprema defina la competencia'],c:1,exp:'La inhibición no produce la nulidad de lo actuado. El juez dicta una resolución declarando su incompetencia y remite las actuaciones al juez competente (el laboral provincial). Los actos procesales válidos realizados hasta ese momento mantienen su eficacia. Esto preserva el principio de economía procesal y el derecho del trabajador a no perder lo avanzado.'}
]},

{id:'c09',mod:'M4',titulo:'La medida cautelar urgente y sus requisitos',
relato:`<p>Una empresa constructora demanda a su cliente el cobro de $10.000.000 por obras ya ejecutadas y certificadas. Al presentar la demanda, solicita un <strong>embargo preventivo</strong> sobre las cuentas bancarias del demandado, adjuntando como prueba los certificados de obra firmados por el cliente y un informe de su contador que indica que el cliente está transfiriendo sus bienes a nombre de terceros. Ofrece como contracautela una caución juratoria. El demandado aún no fue notificado de la demanda.</p>`,
preguntas:[
{text:'¿Cuáles son los requisitos que el juez debe verificar para ordenar el embargo?',opts:['Solo que la deuda esté documentada en un instrumento con valor probatorio','Verosimilitud del derecho (fumus boni iuris) y peligro en la demora (periculum in mora), más la contracautela','Sentencia favorable previa más el depósito del monto reclamado en garantía','Que el demandado sea notificado y se le dé oportunidad de oponerse antes de trabar el embargo'],c:1,exp:'Los tres requisitos de las medidas cautelares son: (1) fumus boni iuris: los certificados firmados por el cliente dan verosimilitud al derecho de la constructora; (2) periculum in mora: el informe sobre transferencia de bienes a terceros acredita el peligro de que sin la medida la sentencia no pueda ejecutarse; (3) contracautela: la caución juratoria ofrecida responde por eventuales daños si la medida resulta injustificada.'},
{text:'¿Es válido que el embargo se trabe sin notificar previamente al demandado?',opts:['No, el principio de bilateralidad siempre exige audiencia previa al afectado','Sí, las medidas cautelares se dictan inaudita parte (sin audiencia previa) para preservar la eficacia de la medida','Solo es válido si el monto del crédito es muy elevado y la urgencia está justificada','Sí, pero solo por 48 horas; luego debe notificarse al demandado y dársele audiencia'],c:1,exp:'Una de las características esenciales de las medidas cautelares es que se dictan inaudita altera pars (sin audiencia previa de la parte afectada). Si se notificara al deudor antes de trabar el embargo, el deudor podría vaciar sus cuentas o transferir sus bienes antes de que la medida surta efecto. Una vez trabado el embargo, el demandado es notificado y puede impugnarlo.'},
{text:'¿Las medidas cautelares producen cosa juzgada material?',opts:['Sí, una vez firmes son inmutables y no pueden ser revisadas','No, son provisionales y mutables: pueden modificarse o levantarse si cambian las circunstancias que las justificaron','Sí, pero solo la cosa juzgada formal, no la material','No, pero solo pueden levantarse con el consentimiento de ambas partes'],c:1,exp:'Las medidas cautelares tienen el carácter de provisionalidad y mutabilidad: no producen cosa juzgada material. Pueden modificarse (ej. ampliar el embargo si se descubren más bienes en riesgo), reducirse (si el acreedor cobró parte de la deuda) o levantarse en cualquier momento si desaparecen las circunstancias que las justificaron (ej. el demandado ofrece garantías reales suficientes), sin necesidad de esperar la sentencia definitiva.'}
]},

{id:'c10',mod:'M1',titulo:'La doble reelección presidencial',
relato:`<p>El presidente en ejercicio ya cumplió un mandato (4 años) y fue reelecto por un segundo período consecutivo (otros 4 años), completando 8 años en total. Al finalizar ese segundo mandato, pretende presentarse para un tercer período consecutivo, argumentando que la Constitución "no lo prohíbe expresamente con esa literalidad". Sus asesores proponen que el Congreso dicte una ley "interpretativa" del art. 90 CN para habilitar esa candidatura. Un grupo de diputados plantea la inconstitucionalidad de esa ley.</p>`,
preguntas:[
{text:'¿Puede una ley del Congreso habilitar la segunda reelección consecutiva modificando el alcance del art. 90 CN?',opts:['Sí, si se aprueba con 2/3 de ambas Cámaras, equivale a una reforma constitucional','No, las leyes no pueden modificar la Constitución; para eso se requiere el procedimiento del art. 30 CN','Sí, porque una "ley interpretativa" no modifica la CN sino que aclara su sentido','Solo si el Poder Judicial la convalida como constitucional'],c:1,exp:'El principio de supremacía constitucional (art. 31 CN) implica que ninguna ley puede modificar la Constitución. Una ley "interpretativa" que habilite lo que el art. 90 CN prohíbe sería inconstitucional: equivaldría a una reforma constitucional por vía legislativa ordinaria, lo cual viola el procedimiento del art. 30 CN que requiere Convención Constituyente.'},
{text:'¿El art. 90 CN puede considerarse una cláusula pétrea implícita?',opts:['No, las cláusulas pétreas solo existen si están expresamente mencionadas como tales','Sí, si la alternancia en el poder es considerada parte de la forma republicana y democrática de gobierno que la CN protege como valor fundamental','Solo si así lo decide la Corte Suprema mediante jurisprudencia vinculante','No, porque el propio art. 30 CN permite reformar cualquier artículo con el procedimiento correcto'],c:1,exp:'Las cláusulas pétreas en Argentina son implícitas: surgen del espíritu y los valores fundamentales de la Constitución, no de una lista explícita. La alternancia en el poder es un elemento esencial de la forma republicana y democrática. Si bien técnicamente el art. 90 CN podría reformarse mediante el procedimiento del art. 30 CN, los límites materiales implícitos podrían considerarlo intangible.'},
{text:'¿Qué vía procesal tienen los diputados para cuestionar la ley que habilita la candidatura?',opts:['Juicio político contra el Presidente por violar la CN','Recurso de casación ante la Cámara Federal','Acción declarativa de certeza o amparo, invocando la inconstitucionalidad de la ley, por vía de control difuso','Solo la Corte Suprema puede declarar inconstitucional una ley del Congreso'],c:2,exp:'En el sistema difuso argentino, cualquier juez puede declarar la inconstitucionalidad de una norma. Los diputados (o cualquier ciudadano con legitimación suficiente) pueden promover una acción declarativa de certeza o un amparo planteando la inconstitucionalidad de la ley interpretativa. El efecto será inter partes, aunque una decisión de la CSJN puede tener un impacto práctico muy amplio.'}
]},

{id:'c11',mod:'M2',titulo:'El iter criminis: tentativa y desistimiento',
relato:`<p>Pedro decide robar en una farmacia. Entra al local, saca un arma y amenaza a la cajera para que le entregue el dinero de la caja. Cuando la cajera va a abrir la caja registradora, Pedro escucha sirenas de policía en la calle, entra en pánico y sale corriendo sin tomar ningún dinero. Es detenido a media cuadra. En el juicio, Pedro argumenta que "desistió voluntariamente" porque decidió no tomar el dinero.</p>`,
preguntas:[
{text:'¿Hay tentativa punible de robo en este caso?',opts:['No, porque Pedro no obtuvo ningún dinero; sin resultado no hay delito','No, porque salió sin consumar el robo, lo que equivale a un desistimiento eficaz','Sí: hubo comienzo de ejecución (entró al local, amenazó a la cajera con arma), dolo de cometer el robo, y no consumación por circunstancias ajenas (el pánico ante las sirenas)','Solo si la cajera sufrió algún daño físico o psicológico por la amenaza'],c:2,exp:'La tentativa (art. 42 CP) requiere: comienzo de ejecución del delito (Pedro ya entró al local y amenazó a la cajera con arma: el robo ya había comenzado a ejecutarse), dolo de cometer el delito (quería robar) y no consumación ajena a la voluntad (las sirenas lo asustaron, causa externa). Todos los requisitos están reunidos: hay tentativa punible de robo.'},
{text:'¿Puede Pedro alegar desistimiento voluntario?',opts:['Sí, porque no tomó el dinero y eso equivale a desistir','No: el desistimiento debe ser voluntario y espontáneo; si Pedro se fue por miedo a ser capturado (causas externas), no es desistimiento voluntario sino tentativa fallida','Sí, porque el desistimiento no requiere que la motivación sea altruista','Sí, pero solo si devuelve lo que haya tomado y repara los daños causados'],c:1,exp:'El desistimiento voluntario requiere que el abandono sea espontáneo: el autor debe cesar por su propia decisión, no por imposibilidad o miedo a ser atrapado. Pedro se fue porque escuchó sirenas de policía: el motivo fue el temor a ser capturado (causa externa). Esto no es desistimiento voluntario; es tentativa frustrada por causas ajenas a la voluntad del autor.'},
{text:'Pedro también amenazó a la cajera con un arma. ¿Este hecho tiene consecuencias penales independientes de la tentativa de robo?',opts:['No, la amenaza queda absorbida por la tentativa de robo','Sí, puede configurar el delito de amenazas (o coacciones) en concurso ideal o real con la tentativa de robo, dependiendo del análisis','No, porque la amenaza fue el medio para cometer el robo y no puede sancionarse por separado','Solo si la cajera presentó denuncia por las amenazas'],c:1,exp:'La amenaza con arma puede configurar el delito de coacciones (art. 149 bis CP), que puede concurrir con la tentativa de robo. Si se trata de una sola conducta que encuadra en dos tipos (tentativa de robo con violencia y coacciones), puede haber concurso ideal. Si son conductas separables, concurso real. El análisis depende de si la amenaza es el medio típico del robo (absorción) o un delito autónomo adicional.'}
]},

{id:'c12',mod:'M4',titulo:'El proceso y la impugnación de la sentencia',
relato:`<p>En un juicio civil por daños y perjuicios, el actor reclamó $500.000 por lesiones sufridas en un accidente de tránsito. El juez de primera instancia condenó al demandado a pagar $800.000, argumentando que debía compensar daños que el actor no había reclamado expresamente (daño moral presunto). El demandado apela, cuestionando el monto. El actor también apela, pidiendo $1.200.000. Ambas apelaciones son resueltas por la Cámara en un solo fallo.</p>`,
preguntas:[
{text:'La sentencia de primera instancia que concede $800.000 cuando se pidieron $500.000 viola el principio de…',opts:['Inmediación procesal','Congruencia (principio ultra petita)','Legalidad constitucional','Bilateralidad o contradicción'],c:1,exp:'La incongruencia ultra petita ocurre cuando el juez concede más de lo pedido por el actor. El actor reclamó $500.000 y el juez otorgó $800.000 "compensando daños no reclamados". Esto viola el principio de congruencia: el juez no puede adjudicar más de lo que fue objeto de la pretensión, aunque crea que el actor merece más. El principio jura novit curia solo habilita a aplicar el derecho correcto, no a introducir pretensiones no planteadas.'},
{text:'¿Qué efectos tiene la apelación del demandado respecto del actor?',opts:['El actor pierde automáticamente los $500.000 que pidió porque el demandado apeló toda la sentencia','La Cámara solo puede revisar los aspectos que el demandado cuestionó en su apelación y, como el actor también apeló, ambos recursos se tramitan conjuntamente','La apelación del demandado cancela la apelación del actor porque hubo una doble impugnación','La Cámara debe rechazar ambas apelaciones porque son contradictorias'],c:1,exp:'Cuando ambas partes apelan, se genera un doble recurso que la Cámara resuelve conjuntamente. La Cámara tiene competencia revisora limitada a los agravios expresados por cada apelante (principio de congruencia en apelación). El demandado pide reducir el monto; el actor pide aumentarlo. La Cámara evaluará ambos agravios y dictará una nueva sentencia dentro de esos límites.'},
{text:'Si la Cámara hace lugar al recurso del demandado y reduce la condena a $400.000 (menos de lo que pidió el actor), ¿puede la Cámara hacer eso?',opts:['No, porque el actor pidió $500.000 y la sentencia no puede estar por debajo de lo que él mismo consideró justo','Sí, la Cámara puede revisar libremente la sentencia de primera instancia y fijar el monto que considere correcto, incluso por debajo del mínimo pedido','Solo si el demandado también ofreció pagar $400.000 como alternativa','Sí, pero debe compensar con algún otro reconocimiento al actor'],c:0,exp:'La Cámara, al revisar el recurso del demandado, tiene como límite (en el sistema dispositivo y por el principio de congruencia en apelación) que no puede perjudicar al apelante más allá de lo que él mismo pidió. Pero tampoco puede conceder menos de lo que el actor reclamó originalmente, porque eso lo perjudicaría más allá de los agravios planteados por el demandado. El sistema procura que la apelación no empeore la situación de la parte que no apeló o no cuestionó ese punto.'}
]}
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentMod='all',currentMode='explorar';
let quizList=[],quizIdx=0,quizCorrect=0,quizAnswered=false;
let casoIdx=0,casoAnswered={};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const MOD_LABELS={M1:'Módulo 1 · Constitucional',M2:'Módulo 2 · Penal',M3:'Módulo 3 · Privado',M4:'Módulo 4 · Procesal'};
const BADGE={M1:'badge-M1',M2:'badge-M2',M3:'badge-M3',M4:'badge-M4'};

function setMod(mod,btn){
  currentMod=mod;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(currentMode==='explorar')renderBrowse();
  else if(currentMode==='quiz')startQuiz();
  else renderCasos();
}
function setMode(mode){
  currentMode=mode;
  ['explorar','quiz','casos'].forEach(m=>{
    document.getElementById('btn-'+m).classList.toggle('active',m===mode);
    document.getElementById('screen-'+m).classList.toggle('visible',m===mode);
  });
  document.getElementById('screen-detail').classList.remove('visible');
  if(mode==='explorar')renderBrowse();
  else if(mode==='quiz')startQuiz();
  else renderCasos();
}

// ═══════════════════════════════════════════
// EXPLORAR
// ═══════════════════════════════════════════
function renderBrowse(){
  document.getElementById('screen-detail').classList.remove('visible');
  document.getElementById('screen-explorar').classList.add('visible');
  const q=(document.getElementById('search-input')?.value||'').toLowerCase().trim();
  let list=currentMod==='all'?TOPICS:TOPICS.filter(t=>t.mod===currentMod);
  if(q)list=list.filter(t=>t.title.toLowerCase().includes(q)||(t.tags||[]).some(g=>g.toLowerCase().includes(q)));
  document.getElementById('stats-bar').textContent=`${list.length} tema${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}`;
  document.getElementById('topic-grid').innerHTML=list.map(t=>{
    const idx=TOPICS.indexOf(t);
    return `<div class="topic-card" onclick="openDetail(${idx})">
      <span class="tc-badge ${BADGE[t.mod]}">${t.mod}</span>
      <div class="tc-title">${t.title}</div>
    </div>`;
  }).join('');
}
function openDetail(idx){
  document.getElementById('screen-explorar').classList.remove('visible');
  document.getElementById('screen-detail').classList.add('visible');
  const t=TOPICS[idx];
  document.getElementById('detail-title').textContent=t.title;
  document.getElementById('detail-body').innerHTML=t.summary;
  document.getElementById('detail-tags').innerHTML=(t.tags||[]).map(g=>`<span class="detail-tag">${g}</span>`).join('');
}
function closeDetail(){
  document.getElementById('screen-detail').classList.remove('visible');
  document.getElementById('screen-explorar').classList.add('visible');
}

// ═══════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════
function startQuiz(){
  quizList=(currentMod==='all'?[...QUIZ]:QUIZ.filter(q=>q.mod===currentMod)).sort(()=>Math.random()-.5);
  quizIdx=0;quizCorrect=0;quizAnswered=false;
  renderQuiz();
}
function renderQuiz(){
  const inner=document.getElementById('quiz-inner');
  const total=quizList.length;
  const scoreEl=document.getElementById('quiz-score-text');
  const progEl=document.getElementById('quiz-prog-text');
  const fillEl=document.getElementById('quiz-fill');
  if(!total){progEl.textContent='';scoreEl.textContent='';fillEl.style.width='0%';inner.innerHTML='<p class="empty-msg">No hay preguntas para este módulo.</p>';return;}
  if(quizIdx>=total){
    progEl.textContent='Finalizado';scoreEl.textContent=`${quizCorrect}/${total} correctas`;fillEl.style.width='100%';
    const p=Math.round(quizCorrect/total*100);
    inner.innerHTML=`<div class="quiz-result"><div class="score-num">${quizCorrect}/${total}</div><div class="score-label">${p}% correctas &mdash; ${p===100?'¡Perfecto! Dominás todos los temas.':p>=70?'Muy bien. Repasá los temas donde fallaste.':'Seguí repasando, vas a mejorar.'}</div><button class="quiz-next" onclick="startQuiz()">Reiniciar</button></div>`;
    return;
  }
  const q=quizList[quizIdx];
  progEl.textContent=`Pregunta ${quizIdx+1} de ${total}`;
  scoreEl.textContent=`${quizCorrect} correctas`;
  fillEl.style.width=`${(quizIdx/total)*100}%`;
  quizAnswered=false;
  inner.innerHTML=`<span class="quiz-tag ${BADGE[q.mod]}">${MOD_LABELS[q.mod]}</span>
    <p class="quiz-q">${q.q}</p>
    <div class="quiz-opts">${q.opts.map((o,i)=>`<button type="button" class="quiz-opt" onclick="answerQuiz(${i})">${o}</button>`).join('')}</div>
    <div class="quiz-feedback" id="qfb" style="display:none"></div>
    <button class="quiz-next" id="qnext" style="display:none" onclick="nextQuizQ()">Siguiente →</button>`;
}
function answerQuiz(i){
  if(quizAnswered)return;
  quizAnswered=true;
  const q=quizList[quizIdx];
  document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  document.querySelectorAll('.quiz-opt')[q.c].classList.add('correct');
  if(i!==q.c)document.querySelectorAll('.quiz-opt')[i].classList.add('wrong');
  else quizCorrect++;
  const fb=document.getElementById('qfb');
  fb.style.display='block';
  fb.innerHTML=`<strong>${i===q.c?'✓ Correcto.':'✗ Incorrecto.'}</strong> ${q.exp}`;
  document.getElementById('qnext').style.display='inline-block';
}
function nextQuizQ(){quizIdx++;renderQuiz();}

// ═══════════════════════════════════════════
// CASOS
// ═══════════════════════════════════════════
function casosList(){return currentMod==='all'?CASOS:CASOS.filter(c=>c.mod===currentMod);}
function renderCasos(){
  const list=casosList();
  if(!list.length){document.getElementById('caso-selector').innerHTML='';document.getElementById('caso-display').innerHTML='<p class="empty-msg">No hay casos prácticos para este módulo.</p>';return;}
  if(casoIdx>=list.length)casoIdx=0;
  document.getElementById('caso-selector').innerHTML=list.map((c,i)=>
    `<button type="button" class="caso-thumb ${i===casoIdx?'active':''}" onclick="selectCaso(${i})">Caso ${i+1}: ${c.titulo.substring(0,30)}${c.titulo.length>30?'…':''}</button>`
  ).join('');
  renderCasoCard(list[casoIdx]);
}
function selectCaso(i){casoIdx=i;renderCasos();}
function renderCasoCard(caso){
  if(!casoAnswered[caso.id])casoAnswered[caso.id]={};
  const list=casosList();
  const idx=list.indexOf(caso);
  const answered=Object.keys(casoAnswered[caso.id]).length;
  const correct=Object.values(casoAnswered[caso.id]).filter(Boolean).length;
  const pregsHTML=caso.preguntas.map((p,qi)=>{
    const ans=casoAnswered[caso.id][qi];
    const done=ans!==undefined;
    return `<div class="caso-pregunta">
      <p class="cpq-text">${qi+1}. ${p.text}</p>
      <div class="cpq-opts">${p.opts.map((o,oi)=>{
        let cls='';
        if(done){if(oi===p.c)cls='correct';else if(oi===ans&&ans!==p.c)cls='wrong';}
        return `<button type="button" class="cpq-opt ${cls}" ${done?'disabled':''} onclick="answerCaso('${caso.id}',${qi},${oi})">${o}</button>`;
      }).join('')}</div>
      ${done?`<div class="cpq-feedback"><strong>${ans===p.c?'✓ Correcto.':'✗ Incorrecto.'}</strong> ${p.exp}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('caso-display').innerHTML=`<div class="caso-card">
    <div class="caso-header">
      <span class="caso-num">Caso ${idx+1} de ${list.length}</span>
      <div>
        <div class="caso-title">${caso.titulo}</div>
        <span class="tc-badge ${BADGE[caso.mod]}">${MOD_LABELS[caso.mod]}</span>
      </div>
    </div>
    <div class="caso-body">
      <div class="caso-relato">${caso.relato}</div>
      <div class="caso-preguntas">${pregsHTML}</div>
    </div>
    <div class="caso-footer">
      <span class="caso-score-text">${answered>0?`${correct}/${answered} correctas en este caso`:'Respondé las preguntas'}</span>
      <div class="caso-nav">
        ${idx>0?`<button type="button" class="btn-sm" onclick="selectCaso(${idx-1})">← Anterior</button>`:''}
        ${idx<list.length-1?`<button type="button" class="btn-sm" onclick="selectCaso(${idx+1})">Siguiente →</button>`:''}
      </div>
    </div>
  </div>`;
}
function answerCaso(id,qi,oi){
  const caso=CASOS.find(c=>c.id===id);
  if(!casoAnswered[id])casoAnswered[id]={};
  if(casoAnswered[id][qi]!==undefined)return;
  casoAnswered[id][qi]=(oi===caso.preguntas[qi].c);
  renderCasoCard(caso);
}

// ── INIT ──
renderBrowse();
</script>
</body>
</html>

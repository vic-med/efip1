<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repasador EFIP 1 · Derecho</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f4f1;--bg3:#eeecea;
  --text:#1a1a18;--text2:#555550;--text3:#888780;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --blue-bg:#e6f1fb;--blue-text:#0c447c;--blue-border:#b5d4f4;
  --green-bg:#eaf3de;--green-text:#27500a;--green-border:#c0dd97;
  --red-bg:#fcebeb;--red-text:#791f1f;--red-border:#f7c1c1;
  --amber-bg:#faeeda;--amber-text:#633806;--amber-border:#fac775;
  --purple-bg:#eeedfe;--purple-text:#3c3489;--purple-border:#cecbf6;
  --teal-bg:#e1f5ee;--teal-text:#085041;--teal-border:#9fe1cb;
  --radius:10px;--radius-sm:7px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --text:#f0ede8;--text2:#b0ada8;--text3:#777470;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --blue-bg:#042c53;--blue-text:#b5d4f4;--blue-border:#0c447c;
    --green-bg:#173404;--green-text:#c0dd97;--green-border:#27500a;
    --red-bg:#501313;--red-text:#f7c1c1;--red-border:#791f1f;
    --amber-bg:#412402;--amber-text:#fac775;--amber-border:#633806;
    --purple-bg:#26215c;--purple-text:#cecbf6;--purple-border:#3c3489;
    --teal-bg:#04342c;--teal-text:#9fe1cb;--teal-border:#085041;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.app-shell{max-width:920px;margin:0 auto;padding:0 1rem 3rem}
.app-header{padding:1.5rem 0 1rem;border-bottom:.5px solid var(--border);margin-bottom:1.25rem}
.app-header h1{font-size:20px;font-weight:600;margin-bottom:2px}
.app-header p{font-size:13px;color:var(--text3)}
.nav-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.mod-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{background:var(--bg2)}
.pill.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.mode-pills{display:flex;gap:4px}
.mode-pill{padding:5px 13px;border-radius:8px;font-size:12px;font-weight:500;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.mode-pill:hover{background:var(--bg2)}
.mode-pill.active{background:var(--bg2);color:var(--text);font-weight:600}
.screen{display:none}.screen.visible{display:block}

/* EXPLORAR */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px}
.topic-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.topic-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.tc-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.badge-M1{background:var(--blue-bg);color:var(--blue-text)}
.badge-M2{background:var(--red-bg);color:var(--red-text)}
.badge-M3{background:var(--green-bg);color:var(--green-text)}
.badge-M4{background:var(--purple-bg);color:var(--purple-text)}
.tc-title{font-size:13px;font-weight:500;line-height:1.4;color:var(--text)}

/* DETAIL */
.detail-back{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--blue-text);cursor:pointer;margin-bottom:1rem;background:none;border:none;padding:0}
.detail-back:hover{text-decoration:underline}
.detail-title{font-size:19px;font-weight:600;margin-bottom:1rem}
.detail-body{font-size:14px;line-height:1.8;color:var(--text2)}
.detail-body p{margin-bottom:.75rem}
.detail-body strong{font-weight:600;color:var(--text)}
.detail-body ul{padding-left:1.25rem;margin-bottom:.75rem}
.detail-body li{margin-bottom:.35rem}
.detail-body .sub{margin-bottom:1rem;padding-left:14px;border-left:2px solid var(--border2)}
.detail-body h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:1.25rem}
.detail-tag{font-size:11px;padding:3px 9px;border-radius:20px;border:.5px solid var(--border2);color:var(--text3)}

/* QUIZ */
.quiz-wrap{max-width:600px}
.quiz-progress{font-size:12px;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue-text);border-radius:2px;transition:width .3s}
.quiz-q{font-size:15px;font-weight:500;margin-bottom:1.1rem;line-height:1.55}
.quiz-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-bottom:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.quiz-opt{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;border:.5px solid var(--border2);background:var(--bg);cursor:pointer;text-align:left;color:var(--text);transition:all .12s}
.quiz-opt:hover:not(:disabled){background:var(--bg2)}
.quiz-opt.correct{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
.quiz-opt.wrong{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.quiz-feedback{font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6;padding:10px 14px;background:var(--bg2);border-radius:var(--radius-sm)}
.quiz-feedback strong{color:var(--text)}
.quiz-next{padding:8px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:background .12s}
.quiz-next:hover{background:var(--bg2)}
.quiz-result{padding:1.5rem 0}
.quiz-result .score-num{font-size:38px;font-weight:700;color:var(--text)}
.quiz-result .score-label{font-size:14px;color:var(--text2);margin-bottom:1.25rem}

/* CASOS */
.caso-wrap{max-width:700px}
.caso-selector{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.25rem}
.caso-thumb{padding:7px 13px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;border:.5px solid var(--border2);background:var(--bg);cursor:pointer;transition:all .12s;color:var(--text2);text-align:left}
.caso-thumb:hover{background:var(--bg2)}
.caso-thumb.active{background:var(--bg2);color:var(--text);border-color:var(--border2);font-weight:600}
.caso-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.caso-header{padding:1rem 1.25rem;border-bottom:.5px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.caso-num{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;padding-top:3px}
.caso-title{font-size:15px;font-weight:600;margin-bottom:4px}
.caso-body{padding:1.25rem}
.caso-relato{font-size:14px;line-height:1.8;color:var(--text2);background:var(--bg2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:1.25rem;border-left:3px solid var(--border2)}
.caso-relato strong{color:var(--text)}
.caso-preguntas{display:flex;flex-direction:column;gap:1.25rem}
.cpq-text{font-size:14px;font-weight:500;margin-bottom:.75rem;line-height:1.5}
.cpq-opts{display:flex;flex-direction:column;gap:6px}
.cpq-opt{padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;border:.5px solid var(--border2);background:var(--bg);cursor:pointer;text-align:left;color:var(--text);transition:all .12s}
.cpq-opt:hover:not(:disabled){background:var(--bg2)}
.cpq-opt.correct{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text)}
.cpq-opt.wrong{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.cpq-feedback{margin-top:8px;font-size:13px;color:var(--text2);padding:9px 13px;background:var(--bg2);border-radius:var(--radius-sm);line-height:1.6}
.cpq-feedback strong{color:var(--text)}
.caso-footer{padding:.75rem 1.25rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:10px}
.caso-score-text{font-size:13px;color:var(--text3)}
.caso-nav{margin-left:auto;display:flex;gap:6px}
.btn-sm{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;border:.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:background .12s}
.btn-sm:hover{background:var(--bg2)}
.empty-msg{font-size:14px;color:var(--text3);padding:1rem 0}
.search-bar{width:100%;padding:9px 14px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:1rem;outline:none}
.search-bar:focus{border-color:var(--blue-text)}
.stats-bar{font-size:12px;color:var(--text3);margin-bottom:.75rem}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// TOPICS — 55 tarjetas temáticas completas
// ═══════════════════════════════════════════
const TOPICS=[
// ── MÓDULO 1: CONSTITUCIONAL ──────────────
{id:'t01',mod:'M1',title:'Poder constituyente: concepto y clasificación',tags:['Reforma','Art. 30'],
summary:`<p>El <strong>poder constituyente</strong> es la competencia o energía para constituir o dar organización política fundamental a un Estado. Es la fuente de toda la juridicidad.</p>
<div class="sub"><h4>Originario</h4><p>Es ilimitado jurídicamente. Se ejerce cuando el pueblo dicta por primera vez una constitución. En Argentina fue ejercido por el pueblo para dictar la Constitución de 1853-1860, tomando en cuenta fuentes ideológicas, históricas y las condiciones de la realidad social. No tiene condicionamientos positivos previos.</p></div>
<div class="sub"><h4>Derivado (de reforma)</h4><p>Es limitado: opera conforme a los límites establecidos por el derecho positivo vigente, tanto en el <em>procedimiento</em> como en la <em>materia</em>. Se manifiesta en las constituciones rígidas como la argentina (art. 30 CN).</p></div>
<div class="sub"><h4>Límites al poder derivado</h4><ul><li><strong>Formales:</strong> el procedimiento especial del art. 30 CN (distinto al de las leyes ordinarias).</li><li><strong>Materiales (cláusulas pétreas implícitas):</strong> forma democrática, forma republicana, federalismo. No están enumeradas explícitamente pero se infieren del espíritu constitucional.</li><li><strong>Heterónomos:</strong> tratados internacionales preexistentes incorporados al derecho argentino.</li></ul></div>
<p>El <strong>titular</strong> del poder constituyente es <strong>el pueblo</strong>.</p>`},

{id:'t02',mod:'M1',title:'Reforma constitucional: etapas y procedimiento',tags:['Art. 30','Convención'],
summary:`<p>El art. 30 CN establece que la Constitución puede reformarse en todo o en cualquiera de sus partes. La voluntad de dos terceras partes de la totalidad de los miembros del Congreso es necesaria para declarar la necesidad de la reforma, no para efectuarla.</p>
<div class="sub"><h4>Etapa 1: Iniciativa o declaración</h4><p>El Congreso declara la necesidad de reforma mediante el voto afirmativo de <strong>2/3 de los miembros de cada Cámara</strong>. Puede fijar: temario (qué artículos se reforman), plazo, y prohibir la reforma de ciertos artículos. La Ley 24.309 de 1994 incluyó un "Núcleo de Coincidencias Básicas" que debía votarse en bloque (indivisible).</p></div>
<div class="sub"><h4>Etapa 2: Revisión o constitutiva</h4><p>La reforma es llevada a cabo por una <strong>Convención Constituyente</strong> especialmente elegida. La Convención está obligada a circunscribirse al temario y plazos fijados por el Congreso. Si se extralimita, sus actos son inconstitucionales.</p></div>
<div class="sub"><h4>Etapa 3: Eficacia o ratificatoria</h4><p>Otorga vigencia normológica a lo reformado. La reforma entra en vigor desde la promulgación por la Convención, sin necesidad de ratificación del Congreso ni del Ejecutivo.</p></div>`},

{id:'t03',mod:'M1',title:'Supremacía constitucional y jerarquía normativa',tags:['Art. 31','Art. 75 inc. 22'],
summary:`<p>La supremacía constitucional tiene dos dimensiones:</p>
<div class="sub"><h4>Fáctica</h4><p>La Constitución como fundamento y base de todo el orden jurídico-político: ninguna norma o acto puede contradecirla válidamente.</p></div>
<div class="sub"><h4>Jurídica</h4><p>La Constitución formal como "súper ley": la ley de leyes, cuya supremacía no admite marginamientos, subordinaciones ni suspensiones. Recepción en el <strong>art. 31 CN</strong>.</p></div>
<div class="sub"><h4>Jerarquía normativa post-1994</h4><ul><li><strong>1.º Bloque de constitucionalidad:</strong> CN + 11 tratados de DDHH del art. 75 inc. 22 (CADH, PIDCP, PIDESC, DUDH, DADDH, CEDAW, CDN, etc.). Todos en igual jerarquía.</li><li><strong>2.º Tratados internacionales ordinarios:</strong> por encima de las leyes (art. 75 inc. 22, primera parte).</li><li><strong>3.º Leyes nacionales</strong></li><li><strong>4.º Decretos y normas inferiores</strong></li></ul></div>
<p>Ante aparente colisión dentro del bloque de constitucionalidad, se aplica la norma <strong>más favorable a la persona</strong> (principio pro homine).</p>`},

{id:'t04',mod:'M1',title:'Bloque de constitucionalidad federal',tags:['Tratados','DDHH'],
summary:`<p>El <strong>bloque de constitucionalidad</strong> es el conjunto normativo que, partiendo de la Constitución, añade disposiciones, principios y valores materialmente constitucionales, incluso fuera del texto escrito.</p>
<div class="sub"><h4>Composición</h4><ul><li>La Constitución Nacional completa (primera parte + parte orgánica).</li><li>Los 11 instrumentos del art. 75 inc. 22: Declaración Americana de los Derechos y Deberes del Hombre, Declaración Universal de DDHH, CADH ("Pacto de San José"), PIDCP, PIDESC, Convención sobre Prevención del Genocidio, Convención contra la Tortura, CEDAW, CDN, Convención sobre la Eliminación de la Discriminación Racial, Convención sobre los Derechos de las Personas con Discapacidad (incorporada posteriormente).</li><li>Los tratados que obtengan en el futuro jerarquía constitucional (mayoría de 2/3 de la totalidad de cada Cámara).</li></ul></div>
<div class="sub"><h4>Efectos</h4><p>Todas las normas del bloque tienen igual jerarquía entre sí. Funcionan como límite heterónomo incluso para el poder constituyente derivado. Opera como parámetro del control de constitucionalidad y convencionalidad.</p></div>`},

{id:'t05',mod:'M1',title:'Control de constitucionalidad: clasificación comparada',tags:['Control','Sistemas'],
summary:`<div class="sub"><h4>Por el órgano que lo ejerce</h4><ul><li><strong>Difuso:</strong> cualquier juez o tribunal puede declarar la inconstitucionalidad. Sistema EE.UU., Argentina.</li><li><strong>Concentrado:</strong> un único órgano especializado (Tribunal Constitucional). Sistema europeo (Kelsen).</li></ul></div>
<div class="sub"><h4>Por la vía procesal</h4><ul><li><strong>Directa (por acción):</strong> el objeto principal del proceso es la declaración de inconstitucionalidad.</li><li><strong>Indirecta (por excepción o incidente):</strong> la inconstitucionalidad se alega como defensa en otro proceso.</li></ul></div>
<div class="sub"><h4>Por los efectos</h4><ul><li><strong>Inter partes:</strong> solo para las partes del caso; no deroga la norma.</li><li><strong>Erga omnes:</strong> la declaración anula la norma para todos.</li></ul></div>
<div class="sub"><h4>Sistema argentino federal</h4><ul><li>Difuso (todos los jueces).</li><li>Ambas vías (principalmente indirecta; directa por amparo y acción declarativa).</li><li>Efectos inter partes como regla.</li><li>Tendencia creciente al control de oficio.</li><li>Principio de razonabilidad como eje del control.</li><li>Cuestiones políticas no justiciables (declaración de estado de sitio, intervención federal) como excepción.</li></ul></div>`},

{id:'t06',mod:'M1',title:'Formas de Estado y federalismo',tags:['Federalismo','Art. 1'],
summary:`<div class="sub"><h4>Formas de Estado según distribución territorial del poder</h4><ul><li><strong>Unitario:</strong> centraliza territorialmente el poder. Un solo ordenamiento jurídico para todo el territorio.</li><li><strong>Federal:</strong> descentraliza políticamente con base territorial. Combina unidad de un Estado con pluralidad de sus partes (fuerzas centrípetas y centrífugas).</li><li><strong>Confederal:</strong> unión de Estados soberanos que conservan su soberanía y se asocian para fines comunes; el vínculo es más laxo y existe derecho de secesión.</li></ul></div>
<div class="sub"><h4>El federalismo argentino (art. 1 CN)</h4><p>La CN adoptó la forma federal en 1853-1860. No fue una creación racional pura sino la recepción de fuerzas históricas y sociológicas: expansión de ciudades coloniales, doctrina federal (Artigas), proceso de pactos interprovinciales (Pacto de San José de Flores, etc.).</p></div>
<div class="sub"><h4>Reforma de 1994</h4><p>Introdujo el "federalismo concertado" o de negociación: obligación de un régimen de coparticipación (art. 75 inc. 2), posibilidad de que las provincias creen regiones (art. 124), régimen autónomo para la Ciudad de Buenos Aires (art. 129).</p></div>`},

{id:'t07',mod:'M1',title:'Relaciones y distribución de competencias en el federalismo',tags:['Competencias','Provincias'],
summary:`<div class="sub"><h4>Relaciones típicas</h4><ul><li><strong>Subordinación:</strong> supremacía federal (art. 31); las constituciones provinciales deben adecuarse (art. 5); las normas provinciales no pueden contradecir la CN.</li><li><strong>Participación (inordinación):</strong> las provincias intervienen en el Gobierno federal a través del Senado (representación provincial) y en organismos federales.</li><li><strong>Coordinación:</strong> sistema de distribución de competencias.</li></ul></div>
<div class="sub"><h4>Competencias exclusivas del Gobierno federal</h4><p>Declaración de estado de sitio, intervención federal, relaciones exteriores, dictado de los códigos de fondo (civil, comercial, penal, minería, trabajo y seguridad social), acuñar moneda, aduanas.</p></div>
<div class="sub"><h4>Competencias exclusivas provinciales</h4><p>Todo lo no delegado al Gobierno federal (art. 121). Ejemplo: dictado de sus propios códigos procesales, régimen electoral local, poder de policía local.</p></div>
<div class="sub"><h4>Competencias concurrentes</h4><p>Pueden legislar ambos. Ejemplos: bienestar general, educación, ambiente (la Nación fija presupuestos mínimos y las provincias los complementan). Ante conflicto, prevalece la norma federal.</p></div>
<div class="sub"><h4>Competencias compartidas y excepcionales</h4><p>Compartidas: requieren doble decisión (ej. creación de nuevas provincias). Excepcionales: normalmente de un nivel, ejercidas por el otro en casos específicos (ej. provincias pueden armar ejércitos en caso de invasión exterior).</p></div>`},

{id:'t08',mod:'M1',title:'Declaraciones, derechos y garantías: conceptos',tags:['Derechos','Garantías'],
summary:`<div class="sub"><h4>Declaraciones</h4><p>Afirmaciones de los grandes principios políticos, económicos y sociales que constituyen la estructura fundamental del Estado. Proporcionan el marco ideológico y los fines que deben orientar la actuación estatal. El <strong>Preámbulo</strong> es el ejemplo paradigmático: unión nacional, justicia, paz interior, defensa común, bienestar general, libertad. Tiene fuerza normativa y es elemento valioso de interpretación.</p></div>
<div class="sub"><h4>Derechos</h4><p>Facultades, prerrogativas o beneficios reconocidos por la Constitución y las leyes a las personas. "Potencias" que significan un beneficio o ventaja para el individuo. El sistema argentino se centra en la persona humana. Además de los enumerados, la CN reconoce <strong>derechos implícitos</strong> (art. 33).</p></div>
<div class="sub"><h4>Garantías</h4><p>Medios o instrumentos (generalmente procesales) que la Constitución y las leyes establecen para asegurar el goce y ejercicio efectivo de los derechos. Permiten defender los derechos cuando son amenazados o violados.</p></div>
<p>La CN posee un <strong>plexo axiológico</strong>: conjunto de valores, principios y derechos que le confieren una orientación definida y no neutral. La reforma de 1994 amplió este plexo incorporando numerosos valores incluso en la parte orgánica.</p>`},

{id:'t09',mod:'M1',title:'Derechos de primera generación: civiles y políticos',tags:['Art. 14','Art. 18','Art. 19'],
summary:`<p>Son los derechos clásicos que surgieron con el constitucionalismo moderno (fines del siglo XVIII). Se caracterizan por ser <strong>libertades negativas</strong>: exigen abstención del Estado.</p>
<div class="sub"><h4>Derechos civiles (art. 14 CN)</h4><ul><li>Trabajar y ejercer toda industria lícita.</li><li>Navegar y comerciar.</li><li>Peticionar a las autoridades.</li><li>Entrar, permanecer, transitar y salir del territorio.</li><li>Publicar ideas por la prensa sin censura previa.</li><li>Usar y disponer de la propiedad.</li><li>Asociarse con fines útiles.</li><li>Profesar libremente su culto.</li></ul></div>
<div class="sub"><h4>Derecho a la intimidad (art. 19 CN)</h4><p>Las acciones privadas de los hombres que de ningún modo ofendan al orden y a la moral pública, ni perjudiquen a un tercero, están solo reservadas a Dios y exentas de la autoridad de los magistrados.</p></div>
<div class="sub"><h4>Inviolabilidades (art. 18 CN)</h4><p>Inviolabilidad del domicilio, de la correspondencia epistolar y de los papeles privados. Una ley determinará en qué casos y con qué justificativos podrá procederse a su allanamiento y ocupación.</p></div>
<div class="sub"><h4>Derechos políticos (art. 37 CN)</h4><p>Sufragio universal, igual, secreto y obligatorio. Igualdad real de oportunidades entre varones y mujeres para acceder a cargos electivos y partidarios (garantizada por acciones positivas).</p></div>`},

{id:'t10',mod:'M1',title:'Derechos de segunda generación: sociales y económicos',tags:['Art. 14 bis','Seguridad social'],
summary:`<p>Surgieron a fines del siglo XIX y principios del XX. Son <strong>libertades positivas</strong> o derechos de prestación que requieren acción o intervención del Estado.</p>
<div class="sub"><h4>Derechos laborales (art. 14 bis CN)</h4><ul><li>Condiciones dignas y equitativas de labor.</li><li>Jornada limitada; descanso y vacaciones pagas.</li><li>Retribución justa; salario mínimo vital y móvil.</li><li>Igual remuneración por igual tarea.</li><li>Participación en las ganancias de las empresas con control de la producción y colaboración en la dirección.</li><li>Protección contra el despido arbitrario.</li><li>Estabilidad del empleado público.</li><li>Organización sindical libre y democrática.</li><li>Derecho de huelga.</li><li>Conciliación y arbitraje.</li></ul></div>
<div class="sub"><h4>Seguridad social (art. 14 bis)</h4><ul><li>Seguro social obligatorio.</li><li>Jubilaciones y pensiones móviles.</li><li>Protección integral de la familia; defensa del bien de familia.</li><li>Compensación económica familiar.</li><li>Acceso a una vivienda digna.</li></ul></div>
<div class="sub"><h4>Educación y cultura (art. 75 inc. 19)</h4><p>El Congreso provee a la educación con igualdad de oportunidades y sin discriminación. El Estado tiene responsabilidad indelegable en la educación pública, gratuita y laica.</p></div>`},

{id:'t11',mod:'M1',title:'Derechos de tercera generación: colectivos y difusos',tags:['Art. 41','Art. 42','Art. 43'],
summary:`<p>Surgieron a partir de la segunda mitad del siglo XX. Conciernen a un colectivo indeterminado de personas.</p>
<div class="sub"><h4>Derecho al ambiente sano (art. 41 CN)</h4><p>Todos los habitantes tienen derecho a un ambiente sano, equilibrado, apto para el desarrollo humano y para que las actividades productivas satisfagan las necesidades presentes sin comprometer las de las generaciones futuras. El daño ambiental generará prioritariamente la obligación de recomponer. Corresponde a la Nación dictar las normas de presupuestos mínimos y a las provincias las necesarias para complementarlas, sin alterar las jurisdicciones locales.</p></div>
<div class="sub"><h4>Derechos de consumidores y usuarios (art. 42 CN)</h4><p>En la relación de consumo: protección de salud, seguridad e intereses económicos; información adecuada y veraz; libertad de elección; trato equitativo y digno. El Estado proveerá la protección de esos derechos, educación para el consumo, defensa de la competencia, control de monopolios.</p></div>
<div class="sub"><h4>Pueblos indígenas (art. 75 inc. 17)</h4><p>Reconocimiento de su preexistencia étnica y cultural. Personería jurídica de sus comunidades. Posesión y propiedad comunitaria de las tierras que tradicionalmente ocupan. Derecho a una educación bilingüe e intercultural. Participación en la gestión de sus recursos naturales.</p></div>
<div class="sub"><h4>Derechos implícitos (art. 33 CN)</h4><p>La enumeración de derechos no es taxativa. Existen derechos que nacen del principio de la soberanía del pueblo y de la forma republicana de gobierno, como: derecho a la salud, derecho a la identidad, derecho al desarrollo, derecho a la calidad de vida digna.</p></div>`},

{id:'t12',mod:'M1',title:'Garantías constitucionales: debido proceso y art. 18 CN',tags:['Art. 18','Debido proceso','Juicio previo'],
summary:`<p>El <strong>art. 18 CN</strong> consagra las garantías del debido proceso. Es la garantía procesal fundamental que asegura la defensa en juicio de la persona y de los derechos.</p>
<div class="sub"><h4>Contenido del art. 18 CN</h4><ul><li><strong>Nullum crimen nulla poena sine lege:</strong> nadie puede ser penado sin juicio previo fundado en ley anterior al hecho del proceso.</li><li><strong>Juez natural:</strong> nadie puede ser sacado de sus jueces naturales ni juzgado por comisiones especiales.</li><li><strong>Inviolabilidad de la defensa:</strong> es inviolable la defensa en juicio de la persona y de los derechos.</li><li><strong>Nemo tenetur:</strong> nadie está obligado a declarar contra sí mismo.</li><li><strong>Inviolabilidad del domicilio, correspondencia y papeles privados.</strong></li><li><strong>Abolición de tormentos y azotes.</strong></li><li><strong>Abolición de penas perpetuas y muerte civil.</strong></li></ul></div>
<div class="sub"><h4>Art. 8 de la CADH (garantías judiciales)</h4><p>Amplía y complementa el art. 18 CN. Garantiza: juez competente, independiente e imparcial; presunción de inocencia; comunicación previa de la acusación; tiempo y medios para preparar la defensa; asistencia letrada; derecho a no declarar contra sí mismo; derecho a recurrir el fallo ante juez o tribunal superior.</p></div>`},

{id:'t13',mod:'M1',title:'Hábeas corpus, amparo y hábeas data',tags:['Art. 43','Amparo','Hábeas corpus'],
summary:`<div class="sub"><h4>Hábeas corpus (art. 43, último párrafo)</h4><p>Acción expedita y rápida para tutelar la libertad física. Clases:</p><ul><li><strong>Clásico o reparador:</strong> contra actos u omisiones que restringen o impiden la libertad física sin orden legal de autoridad competente.</li><li><strong>Preventivo:</strong> frena amenazas ciertas e inminentes a la libertad física.</li><li><strong>Correctivo:</strong> contra toda forma ilegítima que agrave la condición de quien está legalmente privado de libertad.</li><li><strong>Restringido:</strong> ante hostigamientos o perturbaciones al derecho de locomoción sin llegar a la privación.</li></ul></div>
<div class="sub"><h4>Amparo (art. 43, 1.º y 2.º párrafos)</h4><p>Acción rápida y expedita contra todo acto u omisión de autoridades públicas o de particulares que, en forma actual o inminente, lesione, restrinja, altere o amenace, con <em>arbitrariedad o ilegalidad manifiesta</em>, derechos y garantías reconocidos por la CN, un tratado o una ley. Procede cuando no existe otro medio judicial más idóneo. Amparo colectivo: afectado, Defensor del Pueblo y asociaciones registradas.</p></div>
<div class="sub"><h4>Hábeas data (art. 43, 3.º párrafo)</h4><p>Para tomar conocimiento de datos personales y su finalidad que consten en registros o bancos de datos públicos o privados. Permite exigir supresión, rectificación, confidencialidad o actualización en caso de falsedad o discriminación. No puede afectar el secreto de las fuentes periodísticas.</p></div>`},

{id:'t14',mod:'M1',title:'Poder Legislativo: estructura, composición y atribuciones',tags:['Congreso','Art. 75'],
summary:`<p>El Poder Legislativo es ejercido por el <strong>Congreso de la Nación</strong>, bicameral.</p>
<div class="sub"><h4>Cámara de Diputados</h4><p>Representación proporcional del pueblo de las provincias y CABA. Elegidos directamente. Mandato 4 años, renovación por mitades cada 2 años. Cámara de origen para leyes sobre contribuciones y reclutamiento de tropas. Ejerce el derecho de acusar en el juicio político.</p></div>
<div class="sub"><h4>Cámara de Senadores</h4><p>3 senadores por cada provincia + 3 por CABA. Elegidos directamente (reforma 1994): 2 bancas para el partido mayoritario, 1 para la primera minoría. Mandato 6 años, renovación por tercios cada 2 años. Cámara de origen para la ley-convenio de coparticipación. Juzga en el juicio político.</p></div>
<div class="sub"><h4>Principales atribuciones (art. 75 CN)</h4><ul><li>Dictar leyes: el proceso incluye iniciativa, discusión, aprobación y promulgación.</li><li>Tributarias: imponer contribuciones; régimen de coparticipación federal.</li><li>Financieras: presupuesto nacional; arreglo de deuda.</li><li>Relaciones internacionales: aprobar o desechar tratados y concordatos.</li><li>Intervención federal (art. 75 inc. 31) y estado de sitio (art. 75 inc. 29).</li><li>Juicio político (art. 53 y 59): Diputados acusa, Senado juzga.</li><li>Poderes implícitos (art. 75 inc. 32): hacer todas las leyes convenientes para ejercer los demás poderes.</li></ul></div>`},

{id:'t15',mod:'M1',title:'Poder Ejecutivo: elección, requisitos y atribuciones',tags:['Presidente','Art. 99','DNU'],
summary:`<p>El Poder Ejecutivo Nacional es desempeñado por un <strong>Presidente de la Nación</strong>: órgano unipersonal o monocrático.</p>
<div class="sub"><h4>Requisitos y elección</h4><p>Haber nacido en el territorio argentino, o ser hijo de ciudadano nativo habiendo nacido en país extranjero. Las demás calidades exigidas para ser senador. La reforma de 1994 eliminó el requisito de pertenecer a la comunión católica. Elegido directamente por <strong>doble vuelta (ballottage)</strong>. Mandato 4 años; puede ser reelecto o sucedido recíprocamente por <strong>un solo período consecutivo</strong> (art. 90).</p></div>
<div class="sub"><h4>Atribuciones principales (art. 99 CN)</h4><ul><li>Jefe de Estado, jefe del Gobierno y responsable político de la administración general.</li><li>Comandante en jefe de las fuerzas armadas.</li><li>Expedición de decretos reglamentarios (no puede alterar el espíritu de la ley).</li><li><strong>Decretos de Necesidad y Urgencia (DNU):</strong> solo cuando circunstancias excepcionales hagan imposible seguir el trámite ordinario. Prohibidos en materia penal, tributaria, electoral y régimen de partidos políticos. Sujetos a control bicameral posterior.</li><li><strong>Veto:</strong> total o parcial. La parte no vetada tiene autonomía normativa.</li><li><strong>Indulto y conmutación</strong> de penas federales, previo informe del tribunal, excepto acusados por Diputados.</li><li>Nombra jueces de la Corte (con acuerdo del Senado, 2/3 en sesión pública).</li><li>Nombra jueces inferiores con acuerdo del Senado a partir de terna del Consejo de la Magistratura.</li></ul></div>`},

{id:'t16',mod:'M1',title:'Jefe de Gabinete de Ministros',tags:['Art. 100','Gabinete','Presidencialismo atenuado'],
summary:`<p>El <strong>Jefe de Gabinete de Ministros</strong> fue introducido por la reforma de 1994 con el objetivo de <em>atenuar el presidencialismo</em>. Es la principal innovación institucional en la parte orgánica.</p>
<div class="sub"><h4>Designación y remoción</h4><p>Nombrado y removido por el Presidente. También puede ser removido por el Congreso mediante <strong>moción de censura</strong>: voto de la mayoría absoluta de la totalidad de los miembros de cada Cámara (mayoría agravada).</p></div>
<div class="sub"><h4>Responsabilidad política</h4><p>Responsable político ante el Congreso. Cualquiera de las Cámaras puede interpelarlo. Si no comparece o no da las explicaciones satisfactorias, puede ser interpelado por la otra Cámara.</p></div>
<div class="sub"><h4>Atribuciones (art. 100 CN)</h4><ul><li>Ejercer la administración general del país.</li><li>Expedir actos y reglamentos necesarios para ejercer las facultades que le atribuye el art. 100.</li><li>Realizar reuniones de gabinete y presidirlas en ausencia del Presidente.</li><li>Refrendar los DNU, los decretos de promulgación parcial de leyes y los decretos reglamentarios.</li><li>Nombrar empleados de la administración (excepto los que corresponden al Presidente).</li><li>Recaudar las rentas de la Nación e invertirlas según el presupuesto.</li><li>Producir los informes y explicaciones que el Congreso le solicite.</li><li>Concurrir al Congreso al menos una vez por mes alternativamente a cada Cámara para informar sobre la marcha del Gobierno.</li></ul></div>`},

{id:'t17',mod:'M1',title:'Poder Judicial de la Nación',tags:['Corte Suprema','Jueces','Art. 110'],
summary:`<p>El Poder Judicial de la Nación está integrado por la <strong>Corte Suprema de Justicia</strong> y los demás tribunales inferiores que el Congreso establezca. Es el baluarte de la seguridad democrática y el intérprete final de la Constitución.</p>
<div class="sub"><h4>Designación de jueces</h4><ul><li><strong>Corte Suprema:</strong> nombrados por el Presidente con acuerdo del Senado por <em>2/3 de sus miembros presentes en sesión pública</em>.</li><li><strong>Jueces inferiores:</strong> nombrados por el Presidente con acuerdo del Senado a partir de <em>terna vinculante</em> del Consejo de la Magistratura.</li></ul></div>
<div class="sub"><h4>Remoción de jueces</h4><ul><li><strong>Corte Suprema:</strong> solo por <em>juicio político</em> (Diputados acusa, Senado juzga).</li><li><strong>Jueces inferiores:</strong> por el <em>Jurado de Enjuiciamiento</em> (arts. 114 y 115). Sus fallos son irrecurribles.</li></ul></div>
<div class="sub"><h4>Garantías de independencia (art. 110 CN)</h4><ul><li><strong>Inamovilidad:</strong> conservan sus empleos mientras dure su buena conducta.</li><li><strong>Intangibilidad de las remuneraciones:</strong> sus sueldos no pueden ser disminuidos de manera alguna mientras permanezcan en sus funciones. Implica actualización frente a la pérdida del valor adquisitivo.</li></ul></div>`},

{id:'t18',mod:'M1',title:'Consejo de la Magistratura y Ministerio Público',tags:['Art. 114','Art. 120','Magistratura'],
summary:`<div class="sub"><h4>Consejo de la Magistratura (art. 114 CN)</h4><p>Órgano creado por la reforma de 1994 para dotar de mayor independencia al Poder Judicial. Integra representantes de los órganos políticos (Congreso y Ejecutivo), jueces de todas las instancias, abogados y personas del ámbito académico-científico. La ley debe asegurar equilibrio entre estas representaciones.</p>
<p><strong>Competencias:</strong></p><ul><li>Seleccionar magistrados mediante concursos públicos de antecedentes y oposición.</li><li>Elaborar las ternas vinculantes para la designación presidencial.</li><li>Administrar el presupuesto del Poder Judicial.</li><li>Ejercer facultades disciplinarias sobre magistrados.</li><li>Disponer la apertura del procedimiento de remoción de jueces inferiores.</li><li>Dictar reglamentos de organización judicial.</li></ul></div>
<div class="sub"><h4>Ministerio Público (art. 120 CN)</h4><p>Órgano incorporado en la reforma de 1994. Es un <strong>órgano extrapoderes</strong>: no forma parte de ninguno de los tres poderes clásicos, aunque está vinculado a la administración de justicia. No es un "cuarto poder". Goza de <em>independencia funcional</em> y <em>autarquía financiera</em>. Integrado por el Procurador General de la Nación y el Defensor General de la Nación. Promueve la actuación de la justicia en defensa de la legalidad y de los intereses generales de la sociedad.</p></div>`},

// ── MÓDULO 2: PENAL ────────────────────────
{id:'t19',mod:'M2',title:'Principio de legalidad penal',tags:['Nullum crimen','Ley previa','Tipicidad'],
summary:`<p>El <strong>principio de legalidad</strong> es la garantía fundamental del Derecho Penal. Históricamente representa la evolución desde el arbitrio judicial ilimitado hacia un sistema regido por la ley.</p>
<div class="sub"><h4>Contenido</h4><ul><li><strong>Ley escrita:</strong> excluye la costumbre como fuente de delitos y penas; la ley debe emanar del Poder Legislativo.</li><li><strong>Ley previa:</strong> la ley debe ser anterior al hecho del proceso (irretroactividad).</li><li><strong>Ley estricta (mandato de determinación):</strong> la ley debe describir con precisión tanto la conducta prohibida como la pena. Excluye la analogía in malam partem.</li><li><strong>Ley cierta:</strong> el ciudadano debe poder conocer cuáles conductas están prohibidas.</li></ul></div>
<div class="sub"><h4>Principio de reserva (art. 19 CN)</h4><p>Las acciones privadas que no ofendan al orden, la moral pública ni perjudiquen a terceros están reservadas a Dios y exentas de la autoridad de los magistrados. Ningún habitante de la Nación será obligado a hacer lo que no manda la ley, ni privado de lo que ella no prohíbe.</p></div>
<div class="sub"><h4>Principio de lesividad</h4><p>La intervención penal solo se justifica ante afectación grave de bienes jurídicos. El derecho penal es <em>ultima ratio</em>: solo si otros medios menos lesivos son insuficientes. El principio de insignificancia excluye la antijuridicidad específica en los delitos de bagatela.</p></div>
<div class="sub"><h4>Non bis in ídem</h4><p>Nadie puede ser juzgado ni sancionado dos veces por el mismo hecho. Se ve afectado cuando se trata como concurso lo que es en realidad una concurrencia de tipos.</p></div>`},

{id:'t20',mod:'M2',title:'Validez temporal de la ley penal',tags:['Retroactividad','Ultraactividad','Ley más benigna'],
summary:`<p>Para determinar la ley aplicable debe establecerse el <strong>momento de comisión del delito</strong>: en los tipos de comisión, el momento de la acción; en los de omisión, el momento en que debió realizarse la acción omitida.</p>
<div class="sub"><h4>Principio general: irretroactividad</h4><p>Se aplica la ley vigente al momento de la comisión del hecho. Nadie puede ser penado por una conducta que no era delito cuando fue cometida.</p></div>
<div class="sub"><h4>Principio de excepción: retroactividad benigna</h4><p>Se aplica la ley posterior más benigna, incluso frente a sentencia condenatoria firme (la tesis más liberal). Esta es la constante prevalencia de la ley más benigna consagrada en el Código Penal argentino.</p></div>
<div class="sub"><h4>Ultraactividad</h4><p>La ley vigente al momento de la comisión del delito, o en el tiempo intermedio entre el delito y la sentencia, sigue rigiendo aunque sea reemplazada por una más gravosa. Evita que el imputado sea perjudicado por leyes dictadas después del hecho.</p></div>
<div class="sub"><h4>Leyes intermedias y modificaciones de normas extrapenales</h4><p>Las leyes que tuvieron vigencia entre la comisión del hecho y el juzgamiento también pueden ser aplicadas si son más benignas. Las modificaciones de normas extrapenales que inciden en la estructura de un tipo penal y revelan un cambio de criterio sobre la incriminación también entran en el concepto de ley penal más benigna.</p></div>`},

{id:'t21',mod:'M2',title:'La acción en la teoría del delito',tags:['Acción','Omisión','Finalismo'],
summary:`<p>El delito es un concepto <strong>analítico y estratificado</strong> que se descompone en niveles secuenciales: acción → tipicidad → antijuridicidad → culpabilidad. Cada categoría presupone la anterior.</p>
<div class="sub"><h4>La acción</h4><p>Primer elemento de la estructura del delito. Es un <em>supraconcepto</em> que abarca todas las manifestaciones de la conducta delictiva: dolosas, imprudentes y omisiones.</p><ul><li><strong>Concepto causalista (Mezger):</strong> conducta humana valorada de determinada manera.</li><li><strong>Concepto finalista (Welzel):</strong> la acción tiene dos etapas: mental (proposición del fin, selección de medios, consideración de efectos concomitantes) y externa (puesta en movimiento de los medios). La voluntad finalista es el elemento central.</li><li><strong>Concepto funcionalista (Roxin):</strong> busca integrar el Derecho Penal con criterios político-criminales. La acción debe vincularse con la teoría del bien jurídico.</li></ul></div>
<div class="sub"><h4>La omisión</h4><p>No hacer algo que el derecho esperaba y exigía que se hiciese. No es un concepto naturalista sino normativo. Tipos omisivos propios (previstos en la ley) e impropios (equivalentes a la comisión activa cuando existe posición de garante).</p></div>
<div class="sub"><h4>Ausencia de acción</h4><p>No hay acción cuando falta el control voluntario: actos reflejos, estados de inconsciencia completa (sonambulismo, hipnosis profunda), fuerza física irresistible (vis absoluta).</p></div>`},

{id:'t22',mod:'M2',title:'El tipo penal: objetivo y subjetivo',tags:['Tipicidad','Dolo','Imputación objetiva'],
summary:`<div class="sub"><h4>El tipo penal</h4><p>Descripción abstracta de la conducta prohibida por la norma. No debe confundirse con el artículo legal. La <em>tipicidad</em> es el resultado de un juicio que determina si una conducta concreta coincide con esa descripción abstracta. <strong>Funciones del tipo:</strong> de garantía, sistemática, vinculante (figura rectora), didáctica, limitadora.</p></div>
<div class="sub"><h4>Tipo objetivo</h4><p>El aspecto externo de la conducta: acción, sujeto activo, objeto del delito, resultado, nexo causal, circunstancias.</p>
<p><strong>Imputación objetiva del resultado:</strong> teoría normativa que busca determinar si el resultado es imputable al autor. Criterios: (1) creación de un riesgo no permitido (la conducta debe superar el riesgo permitido en la sociedad); (2) realización del riesgo en el resultado; (3) que el resultado esté dentro del fin de protección de la norma violada; (4) competencia de la víctima (exclusión cuando fue ella quien asumió el riesgo).</p></div>
<div class="sub"><h4>Tipo subjetivo: el dolo</h4><p>El dolo es el <strong>conocimiento y la voluntad</strong> de realizar el tipo penal. Evolucionó desde la culpabilidad (causalismo) hasta el tipo (finalismo).</p><ul><li><strong>Elementos:</strong> cognoscitivo (conocer los elementos del tipo objetivo) y volitivo (querer la realización del tipo).</li><li><strong>Dolo directo (de primer grado):</strong> el resultado es el fin buscado por el autor.</li><li><strong>Dolo indirecto (de segundo grado / de consecuencias necesarias):</strong> el resultado no es el fin pero es consecuencia necesaria e inevitable del medio elegido.</li><li><strong>Dolo eventual:</strong> el autor conoce la probable producción del resultado y no deja de actuar, aceptándolo (teoría del asentimiento). Umbral mínimo del dolo.</li></ul></div>
<div class="sub"><h4>Error de tipo</h4><p>El error sobre los elementos del tipo objetivo excluye el dolo. Si es invencible: excluye la tipicidad. Si es vencible: puede quedar la responsabilidad culposa si el tipo lo prevé.</p></div>`},

{id:'t23',mod:'M2',title:'Antijuridicidad y causas de justificación',tags:['Antijuridicidad','Legítima defensa','Estado de necesidad'],
summary:`<p>La <strong>antijuridicidad</strong> es la contradicción de la conducta con el ordenamiento jurídico en su totalidad. Una conducta típica es <em>indiciariamente</em> antijurídica; las causas de justificación eliminan esa contradicción.</p>
<div class="sub"><h4>Causas de justificación</h4><p>Circunstancias que autorizan una conducta típica. El derecho es una unidad: no pueden existir normas que a la vez exijan y prohíban la misma acción. Las causas de justificación provienen de todo el ordenamiento jurídico (civil, penal, administrativo, etc.).</p></div>
<div class="sub"><h4>Legítima defensa (art. 34 incs. 6 y 7 CP)</h4><p>Permite la defensa de la persona o sus derechos. <strong>Requisitos:</strong></p><ul><li>Agresión ilegítima (actual o inminente, no provocada).</li><li>Necesidad racional del medio empleado para impedirla o repelerla (no exige igualdad de medios, sino racionalidad).</li><li>Falta de provocación suficiente por parte del que se defiende.</li><li>En la defensa de terceros: no haber intervenido en la provocación.</li></ul></div>
<div class="sub"><h4>Estado de necesidad</h4><p>Situación de peligro actual para intereses legítimos que solo puede conjurarse lesionando intereses legítimos de otro.</p><ul><li><strong>Justificante:</strong> el mal causado es <em>menor</em> al mal que se evita. Elimina la antijuridicidad.</li><li><strong>Exculpante:</strong> el mal causado es <em>igual o mayor</em> pero no es exigible soportar la lesión. Elimina la culpabilidad por inexigibilidad.</li></ul><p>La valoración de bienes se hace desde las escalas penales, no desde criterios supralegales individuales.</p></div>
<div class="sub"><h4>Exceso en las causas de justificación (art. 35 CP)</h4><p>Cuando se exceden los límites impuestos por la ley, la autoridad o la necesidad, se aplica la pena fijada para el delito culposo correspondiente.</p></div>`},

{id:'t24',mod:'M2',title:'Culpabilidad e imputabilidad',tags:['Culpabilidad','Imputabilidad','Inimputabilidad'],
summary:`<p>La <strong>culpabilidad</strong> es la categoría que establece la posibilidad de reproche personal al autor por su conducta antijurídica. Principio: <em>nulla poena sine culpa</em> (jerarquía constitucional implícita, art. 19 CN). Rechaza la responsabilidad objetiva.</p>
<div class="sub"><h4>Elementos de la culpabilidad</h4><ul><li><strong>Imputabilidad:</strong> capacidad psíquica de culpabilidad.</li><li><strong>Conocimiento de la antijuridicidad:</strong> posibilidad de conocer que el hecho es ilícito (error de prohibición).</li><li><strong>Exigibilidad de otra conducta:</strong> que el autor haya podido actuar de otra manera (inexigibilidad como causa de inculpabilidad).</li></ul></div>
<div class="sub"><h4>Imputabilidad (art. 34 inc. 1 CP)</h4><p>Capacidad de comprender la criminalidad del acto y de dirigir las acciones. Presupone madurez psíquica y salud mental.</p>
<p><strong>Causas de inimputabilidad:</strong></p><ul><li>Insuficiencia de las facultades mentales (deficiencias mentales: idiocia, imbecilidad, debilidad mental).</li><li>Alteraciones morbosas de las facultades mentales (enfermedades mentales que trastornan facultades ya desarrolladas: psicosis, esquizofrenia, etc., clasificadas en el DSM).</li><li>Estado de inconsciencia (art. 34 inc. 1 in fine): la alteración debe ser patológica en sí misma, no meramente transitoria por causas voluntarias (embriaguez voluntaria no es inimputabilidad).</li></ul></div>
<div class="sub"><h4>Error de prohibición</h4><p>El autor no sabe que su conducta es antijurídica. Si es invencible: elimina la culpabilidad. Si es vencible: la culpabilidad disminuye.</p></div>`},

{id:'t25',mod:'M2',title:'Iter criminis y tentativa punible',tags:['Iter criminis','Tentativa','Art. 42 CP'],
summary:`<p>El <strong>iter criminis</strong> es el camino que recorre el sujeto para la realización de un delito, desde la ideación hasta el agotamiento.</p>
<div class="sub"><h4>Fases</h4><ul><li><strong>Interna (impune):</strong> ideación, deliberación, decisión. El pensamiento no delinque.</li><li><strong>Actos preparatorios (impune como regla):</strong> actos externos pero previos a la ejecución. Excepcionalmente punibles cuando la ley los tipifica autónomamente (ej. asociación ilícita).</li><li><strong>Actos ejecutivos (punibles):</strong> comienzan con el principio de ejecución del delito.</li><li><strong>Consumación:</strong> realización completa del tipo penal.</li><li><strong>Agotamiento:</strong> el autor logra el fin ulterior buscado (no necesariamente típico).</li></ul></div>
<div class="sub"><h4>Tentativa punible (art. 42 CP)</h4><p><strong>Elementos:</strong></p><ul><li>Comienzo de ejecución del delito (elemento objetivo).</li><li>Fin de cometer un delito determinado (elemento subjetivo: dolo directo).</li><li>No consumación por circunstancias ajenas a la voluntad del autor.</li></ul>
<p><strong>Penalidad:</strong> la escala penal se reduce: el juez fija primero la pena del delito consumado y luego la disminuye en un tercio del mínimo a la mitad del máximo.</p></div>
<div class="sub"><h4>Desistimiento voluntario</h4><p>Causa de exención de pena en la tentativa. El autor abandona espontáneamente la ejecución (o impide la consumación, en la tentativa acabada). Debe ser voluntario (no por imposibilidad o temor a ser descubierto). El desistimiento es personal: no aprovecha a los demás partícipes que no desistieron. El autor responde por los actos ya consumados (ej. daños causados).</p></div>`},

{id:'t26',mod:'M2',title:'Participación criminal: autoría y complicidad',tags:['Autoría','Coautoría','Complicidad'],
summary:`<div class="sub"><h4>Principios comunes</h4><ul><li>Exterioridad: el Derecho Penal se basa en hechos exteriores que vulneren bienes jurídicos.</li><li>Comunidad de hecho: base compartida para la responsabilidad.</li><li>Convergencia subjetiva: el partícipe debe conocer y querer su participación en el hecho común.</li><li>Accesoriedad: la participación depende de la existencia de un hecho principal.</li></ul></div>
<div class="sub"><h4>Teorías para definir al autor</h4><ul><li><strong>Formal-objetiva:</strong> autor es quien ejecuta por sí mismo las acciones del tipo.</li><li><strong>Subjetiva:</strong> autor es quien quiere el hecho como propio (animus auctoris).</li><li><strong>Dominio del hecho (Roxin):</strong> autor es quien tiene el control final sobre la ejecución. Es la teoría predominante.</li></ul></div>
<div class="sub"><h4>Formas de autoría</h4><ul><li><strong>Autor directo:</strong> ejecuta por sí mismo el hecho.</li><li><strong>Coautor (dominio funcional):</strong> decisión conjunta + división del trabajo + codominio del hecho.</li><li><strong>Autor mediato:</strong> se sirve de otro como instrumento (por error, coacción o inimputabilidad del ejecutor).</li></ul></div>
<div class="sub"><h4>Participación en sentido estricto</h4><ul><li><strong>Cómplice necesario (art. 45 CP):</strong> cooperación sin la cual el delito no se hubiera podido cometer. Misma escala penal que el autor, aunque la doctrina distingue.</li><li><strong>Cómplice no necesario (art. 46 CP):</strong> cooperación secundaria, no indispensable. Escala penal reducida: mínimo reducido en un tercio y máximo a la mitad.</li><li><strong>Instigador (art. 45 CP):</strong> quien determina directamente a otro a cometer el delito. Misma escala que el autor.</li></ul></div>`},

{id:'t27',mod:'M2',title:'Concurso de delitos',tags:['Concurso ideal','Concurso real','Delito continuado'],
summary:`<div class="sub"><h4>Concurso ideal (art. 54 CP)</h4><p>Un <strong>hecho único</strong> que encuadra en la pluralidad de tipos delictivos. Los tipos se superponen parcialmente (círculos secantes) sin que ninguno incluya al otro. <strong>Penalidad:</strong> se aplica <em>solo la pena mayor</em>. La unidad de hecho puede entenderse como unidad corporal del acto o como unidad de la objetividad real del delito.</p></div>
<div class="sub"><h4>Delito continuado</h4><p>Pluralidad de actos que, unidos por una única resolución criminal, forman una unidad típica. <strong>Requisitos:</strong></p><ul><li>Unidad de resolución criminal (elemento subjetivo): plan o propósito único que conecta los actos.</li><li>Pluralidad de acciones homogéneas (elemento objetivo).</li><li>Violación del mismo o similar bien jurídico penal.</li><li>Proximidad temporal entre los actos.</li></ul><p><strong>Consecuencia jurídica:</strong> se aplica la pena del delito más grave con posible aumento. Más benigno que el concurso real.</p></div>
<div class="sub"><h4>Concurso real (art. 55 CP)</h4><p><strong>Pluralidad de hechos independientes</strong> cometidos por un solo agente, juzgados en el mismo proceso. Los tipos no tienen elementos comunes. <strong>Elementos:</strong> pluralidad de hechos, independencia entre ellos, concurrencia (simultánea, sucesiva o mixta), juzgamiento conjunto. <strong>Penalidad:</strong> acumulación jurídica con tope legal.</p></div>`},

// ── MÓDULO 3: PRIVADO ──────────────────────
{id:'t28',mod:'M3',title:'Persona humana: inicio, fin y atributos',tags:['Persona','Nacimiento','Nombre','Domicilio'],
summary:`<p>El CCyC no define a la persona humana, asumiendo que no requiere definición jurídica.</p>
<div class="sub"><h4>Personas por nacer</h4><p>Se mantiene la presunción de vida en caso de duda; quien alegue que el niño nació muerto debe probarlo. El nacimiento <em>consolida</em> la personalidad ya poseída desde la concepción. La CIDH interpretó que el embrión no es persona para los efectos del art. 4.1 CADH hasta su implantación en el útero.</p></div>
<div class="sub"><h4>Nombre</h4><p>Carácter de <em>derecho-deber</em>. Libre elección del prenombre por los padres, con limitación de que no sean extravagantes, ridículos u ofensivos. No puede inscribirse el mismo prenombre del padre. El cambio de prenombre o apellido tramita por el procedimiento más abreviado que prevea la ley local. Acciones de protección del nombre: supresión del uso indebido, indemnización (art. 71 CCyC).</p></div>
<div class="sub"><h4>Domicilio</h4><ul><li><strong>Real:</strong> lugar de residencia habitual. Si hay actividad profesional, el domicilio real es el lugar de esa actividad para obligaciones nacidas de ella. Voluntario y mutable.</li><li><strong>Legal:</strong> donde la ley presume residencia permanente. Forzoso, excepcional, interpretación restrictiva. Ej: funcionarios públicos, militares en servicio activo.</li><li><strong>Especial (convencional):</strong> produce efectos limitados a una o varias relaciones jurídicas. Voluntario, convencional, múltiple, transmisible.</li></ul></div>
<div class="sub"><h4>Fin de la existencia</h4><p>La persona humana termina con la muerte, que debe ser comprobada médicamente. La muerte presunta puede declararse judicialmente cuando la persona ha desaparecido de su domicilio sin que se tenga noticia de ella.</p></div>`},

{id:'t29',mod:'M3',title:'Capacidad: clases, limitaciones y sistemas',tags:['Capacidad','Incapacidad','CCyC'],
summary:`<p>La <strong>capacidad</strong> es la aptitud de la persona para ser titular de derechos y deberes jurídicos y para ejercerlos.</p>
<div class="sub"><h4>Capacidad de derecho</h4><p>Aptitud para ser titular de derechos y deberes. Toda persona humana la tiene. Solo se limita respecto de determinados actos concretos por razones de incompatibilidad o conflicto de intereses (ej: los abogados no pueden comprar bienes del juicio en que intervienen).</p></div>
<div class="sub"><h4>Capacidad de ejercicio</h4><p>Aptitud para ejercer por sí misma los derechos y cumplir los deberes. La capacidad general de ejercicio <strong>se presume</strong>, incluso si la persona está internada. Las limitaciones son excepcionales y siempre en beneficio de la persona.</p></div>
<div class="sub"><h4>Discernimiento (CCyC art. 261)</h4><ul><li>Para actos <strong>lícitos:</strong> desde los <strong>13 años</strong>.</li><li>Para actos <strong>ilícitos:</strong> desde los <strong>10 años</strong>.</li><li>Causas obstativas: minoría de edad (en los límites señalados) y privación de razón.</li></ul></div>
<div class="sub"><h4>Menor de edad y adolescente</h4><p>Menor de edad: persona que no cumplió 18 años. Adolescente: persona que tiene entre 13 y 18 años. El derecho a ser oído debe garantizarse en todos los procesos que los afecten; su opinión se considera según su edad y grado de madurez. En materia de salud: pueden prestar consentimiento informado para procedimientos sin riesgo a partir de los 16 años; entre 13 y 16, si es un acto médico de bajo riesgo.</p></div>`},

{id:'t30',mod:'M3',title:'Restricciones a la capacidad e inhabilitación',tags:['Capacidad restringida','Incapacidad','Inhabilitado'],
summary:`<div class="sub"><h4>Capacidad restringida</h4><p>El juez puede restringir la capacidad para determinados actos de una persona mayor de 13 años que padece una adicción o una alteración mental permanente o prolongada, de suficiente gravedad, cuando estime que del ejercicio de su plena capacidad puede resultar daño a su persona o bienes. Se designan <strong>apoyos</strong> para facilitar la toma de decisiones.</p></div>
<div class="sub"><h4>Incapacidad</h4><p>Se declara solo si la persona se encuentra absolutamente imposibilitada de interactuar con su entorno y manifestar su voluntad, y el sistema de apoyos resulta ineficaz. Se designa un <strong>curador</strong>.</p></div>
<div class="sub"><h4>Procedimiento</h4><ul><li>Juez del domicilio o lugar de internación.</li><li>La persona en cuyo interés se lleva el proceso es <em>parte</em>.</li><li>El juez debe realizar una <strong>entrevista personal</strong> (indelegable).</li><li>Dictamen de <strong>equipo interdisciplinario</strong> (imprescindible).</li><li>Revisión mínima cada <strong>3 años</strong>.</li><li>La sentencia debe pronunciarse sobre diagnóstico, pronóstico, época de manifestación, recursos existentes y régimen de protección.</li></ul></div>
<div class="sub"><h4>Inhabilitados (art. 48 CCyC)</h4><p>Solo los <strong>pródigos</strong>: personas cuyas acciones de administración y disposición de bienes exponen a su familia a la pérdida del patrimonio. Presupuestos: cónyuge, ascendientes o descendientes (legitimados para iniciar la acción) + dilapidación de parte importante del patrimonio. Se aplican las reglas de la capacidad restringida.</p></div>`},

{id:'t31',mod:'M3',title:'Persona jurídica: naturaleza, clasificación y atributos',tags:['Persona jurídica','Inoponibilidad','Objeto social'],
summary:`<p>Las <strong>personas jurídicas</strong> son entes a los que el ordenamiento jurídico les confiere aptitud para adquirir derechos y contraer obligaciones para el cumplimiento de su objeto y fines. La personalidad jurídica es un recurso técnico del legislador.</p>
<div class="sub"><h4>Clasificación</h4><ul><li><strong>Públicas:</strong> el Estado Nacional, las provincias, los municipios, las entidades autárquicas, los Estados extranjeros, la Iglesia Católica, etc.</li><li><strong>Privadas:</strong> sociedades, asociaciones civiles, simples asociaciones, fundaciones, iglesias y comunidades religiosas no católicas, mutuales, cooperativas, etc.</li></ul></div>
<div class="sub"><h4>Inoponibilidad de la personalidad jurídica</h4><p>Cuando la actuación de la persona jurídica encubre la consecución de fines ajenos a ella, constituye un recurso para violar la ley, el orden público, la buena fe o los derechos de terceros, los jueces pueden imputar los efectos de los actos a quienes los realizaron (corrimiento del velo societario). Aplicación <em>restrictiva</em>.</p></div>
<div class="sub"><h4>Atributos</h4><ul><li><strong>Nombre:</strong> debe explicitar la actuación del colectivo. Distinto del nombre comercial.</li><li><strong>Domicilio y sede social:</strong> fijado en estatutos o autorización; vinculante para la sociedad y liberatorio para terceros que actúen de buena fe.</li><li><strong>Patrimonio:</strong> conjunto de bienes con valoración económica. El de las fundaciones requiere patrimonio inicial.</li><li><strong>Capacidad de derecho:</strong> limitada por el <em>objeto social</em>: solo puede realizar los actos propios de la actividad para la que fue constituida.</li></ul></div>`},

{id:'t32',mod:'M3',title:'Bienes, cosas y patrimonio',tags:['Bienes','Cosas','Inmuebles','Patrimonio'],
summary:`<div class="sub"><h4>Bienes y cosas</h4><p>El CCyC define: <em>bienes</em> = objetos inmateriales susceptibles de valor económico + cosas. <em>Cosas</em> = objetos materiales susceptibles de valor.</p></div>
<div class="sub"><h4>Clasificación de las cosas</h4><ul><li><strong>Inmuebles por su naturaleza:</strong> el suelo, las partes sólidas o fluidas que forman su superficie y profundidad. <strong>Por accesión:</strong> construcciones permanentes adheridas al suelo (edificios, casas). El CCyC unificó: ya no existe "inmueble por accesión moral".</li><li><strong>Muebles:</strong> se desplazan por sí mismos (semovientes) o por fuerza externa. Los buques y aeronaves, aunque muebles, tienen régimen especial.</li><li><strong>Divisibles:</strong> pueden fraccionarse en partes homogéneas sin alterar su esencia. Indivisibles si la división hace antieconómico el uso (relevante para condominios y herencias).</li><li><strong>Consumibles:</strong> no pueden usarse conforme a su naturaleza sin consumirse (alimentos) o tienen idéntico poder liberatorio (dinero). Distintas de las <em>fungibles</em> (intercambiables por otras de la misma especie).</li><li><strong>Frutos:</strong> naturales (espontáneos de la naturaleza), industriales (actividad del hombre), civiles (rentas por relación jurídica: alquileres, intereses). No alteran la sustancia de la cosa madre.</li><li><strong>Productos:</strong> separados de la cosa principal; su extracción altera o disminuye la sustancia.</li></ul></div>
<div class="sub"><h4>Patrimonio y vivienda</h4><p>El patrimonio es el conjunto de bienes y derechos con valoración económica de una persona. Atributo de la persona. El régimen de <strong>afectación de vivienda</strong> (arts. 244-256 CCyC) protege el inmueble destinado a vivienda: inembargable e inejecutable por deudas posteriores a la afectación. Excepción: obligaciones por mejoras y reparaciones sobre el inmueble, expensas, impuestos.</p></div>`},

{id:'t33',mod:'M3',title:'Hecho jurídico, voluntad y acto jurídico',tags:['Hecho jurídico','Acto jurídico','Voluntad'],
summary:`<div class="sub"><h4>Hecho jurídico (art. 257 CCyC)</h4><p>Acontecimiento que conforme al ordenamiento jurídico produce el nacimiento, modificación o extinción de relaciones o situaciones jurídicas. Es la fuente de las relaciones de Derecho. Los <em>simples actos lícitos</em> son hechos humanos voluntarios no ilícitos de los que resulta alguna adquisición, modificación o extinción de relaciones jurídicas, sin tener fin inmediato de producirlas (efectos ex lege, no ex voluntate).</p></div>
<div class="sub"><h4>Voluntad jurídica</h4><p>Base de la autonomía privada. Sus elementos internos:</p><ul><li><strong>Discernimiento:</strong> madurez intelectual para comprender y valorar el acto y sus consecuencias.</li><li><strong>Intención:</strong> uso del discernimiento con propósito de un resultado determinado.</li><li><strong>Libertad:</strong> ausencia de coacción o intimidación.</li></ul><p>Elemento externo: la manifestación de la voluntad (expresa u oral, escrita, por signos; tácita). El silencio no es manifestación salvo disposición legal, acuerdo de partes o relación con declaraciones precedentes.</p></div>
<div class="sub"><h4>Acto jurídico (art. 259 CCyC)</h4><p>Hecho humano voluntario <strong>lícito</strong> que tiene por fin inmediato la <strong>adquisición, modificación o extinción</strong> de relaciones o situaciones jurídicas. Diferencia con el hecho jurídico: en el acto jurídico el fin inmediato es el efecto jurídico (ex voluntate).</p></div>`},

{id:'t34',mod:'M3',title:'Vicios de los actos voluntarios: error, dolo y violencia',tags:['Error','Dolo','Violencia','Vicios'],
summary:`<div class="sub"><h4>Error (art. 265 CCyC)</h4><p>Debe ser <strong>esencial</strong> (recae sobre aspecto primordial del acto: naturaleza, objeto, calidad, persona, causa) y <strong>reconocible</strong> (una persona de normal diligencia en las mismas circunstancias hubiera podido advertirlo). <strong>Efectos:</strong> nulidad del acto. Si el error no es reconocible, no afecta la validez.</p></div>
<div class="sub"><h4>Dolo (arts. 271-275 CCyC)</h4><p>Toda aserción de lo falso, disimulación de lo verdadero, artificio, astucia o cualquier maniobra empleada para obtener la ejecución de un acto. También la omisión dolosa.</p><ul><li><strong>Dolo esencial:</strong> es causa eficiente del acto. Requisitos: grave, determinante del acto, causó daño relevante, no fue recíproco. <strong>Efecto:</strong> nulidad del acto + indemnización.</li><li><strong>Dolo incidental:</strong> no cumple uno o más requisitos. No causa la nulidad pero sí da lugar a indemnización de perjuicios.</li></ul><p>El dolo puede provenir de un tercero: si el contratante beneficiado conocía el engaño, el acto es anulable; si no conocía, el tercero responde por los daños.</p></div>
<div class="sub"><h4>Violencia (arts. 276-278 CCyC)</h4><ul><li><strong>Fuerza irresistible (vis absoluta):</strong> coacción física directa que suprime la voluntad del sujeto.</li><li><strong>Intimidación (vis compulsiva):</strong> amenaza de sufrir un mal grave e inminente en la persona, libertad, honor o bienes del sujeto o de terceros.</li></ul><p>La violencia puede provenir de un tercero: el tercero y quien se beneficia del acto responden solidariamente. <strong>Efecto:</strong> nulidad del acto.</p></div>`},

{id:'t35',mod:'M3',title:'Vicios propios del acto jurídico: lesión, simulación y fraude',tags:['Lesión','Simulación','Fraude','Inoponibilidad'],
summary:`<div class="sub"><h4>Lesión (art. 332 CCyC)</h4><p>Puede demandarse la nulidad o modificación de los actos jurídicos cuando una de las partes explotando la necesidad, debilidad psíquica o inexperiencia de la otra, obtuviera por medio de ellos una ventaja patrimonial evidentemente desproporcionada y sin justificación. <strong>Presupuestos:</strong> elemento objetivo (desproporción injustificada de prestaciones) + elemento subjetivo (explotación de la inferioridad). <strong>Acciones del lesionado:</strong> nulidad del acto o reajuste equitativo del convenio. El demandado puede ofrecer el reajuste.</p></div>
<div class="sub"><h4>Simulación (arts. 333-337 CCyC)</h4><p>La simulación tiene lugar cuando se encubre el carácter jurídico de un acto bajo la apariencia de otro, o cuando el acto contiene cláusulas que no son sinceras, o fechas que no son verdaderas, o cuando por él se constituyen o transmiten derechos a personas interpuestas, que no son aquellas para quienes en realidad se constituyen o transmiten.</p><ul><li><strong>Absoluta:</strong> el acto aparente no oculta ningún acto real.</li><li><strong>Relativa:</strong> el acto aparente oculta un acto real distinto.</li></ul><p>Si el bien fue transmitido a un tercero de buena fe y a título oneroso: la acción de simulación se detiene; los participantes del acto simulado deben indemnizar.</p></div>
<div class="sub"><h4>Fraude y acción de inoponibilidad (art. 338 CCyC)</h4><p>Actos realizados por un deudor en perjuicio de sus acreedores, sustrayendo bienes de su patrimonio. <strong>Requisitos:</strong> crédito anterior al acto fraudulento (regla), perjuicio al acreedor, conocimiento del deudor de que el acto perjudica al acreedor (fraude pauliano), conocimiento del tercero de la situación de insolvencia si el acto es a título oneroso. <strong>Efecto:</strong> inoponibilidad (el acto es válido entre partes pero no produce efectos frente al acreedor que la obtuvo).</p></div>`},

{id:'t36',mod:'M3',title:'Ineficacia de los actos jurídicos',tags:['Nulidad','Ineficacia','Anulabilidad'],
summary:`<p>La <strong>ineficacia</strong> es la negación de la aptitud de un acto jurídico para alcanzar y mantener los efectos para los que fue creado.</p>
<div class="sub"><h4>Clasificación</h4><ul><li><strong>Ineficacia estructural (invalidez):</strong> defectos originarios y constitutivos del acto. Nulidad: privación de los efectos propios por sus defectos.<ul><li><em>Nulidad absoluta:</em> afecta el orden público; puede declararse de oficio; no es confirmable; cualquier interesado puede invocarla; el Ministerio Público también.</li><li><em>Nulidad relativa:</em> protege un interés particular; solo puede invocarla la parte en cuyo beneficio se establece; es confirmable.</li></ul></li><li><strong>Ineficacia funcional (sobreviniente):</strong> circunstancias posteriores a la celebración. Resolución, revocación, rescisión.</li><li><strong>Inoponibilidad:</strong> el acto es válido entre partes pero no produce efectos respecto de ciertos terceros.</li><li><strong>Conversión:</strong> un acto inválido que reúne los requisitos de otro acto distinto puede convertirse en éste si el fin práctico perseguido es compatible.</li></ul></div>
<div class="sub"><h4>Efectos de la nulidad</h4><p>Las partes deben restituirse mutuamente lo que han recibido. Si el bien fue transmitido a un subadquirente de buena fe y a título oneroso, la restitución es imposible. Las nulidades no tienen efectos respecto de terceros de buena fe y a título oneroso.</p></div>`},

{id:'t37',mod:'M3',title:'El contrato: concepto, clasificación y elementos',tags:['Contrato','Oferta','Aceptación','Autonomía'],
summary:`<p>El <strong>contrato</strong> es el acto jurídico mediante el cual dos o más partes manifiestan su consentimiento para crear, regular, modificar, transferir o extinguir relaciones jurídicas patrimoniales (art. 957 CCyC).</p>
<div class="sub"><h4>Clasificaciones</h4><ul><li><strong>Bilaterales / unilaterales:</strong> según si ambas o solo una parte quedan obligadas.</li><li><strong>Onerosos / gratuitos:</strong> según si ambas partes obtienen ventajas o solo una.</li><li><strong>Conmutativos / aleatorios:</strong> en los conmutativos las ventajas son ciertas desde el inicio; en los aleatorios dependen de un acontecimiento incierto.</li><li><strong>Formales / no formales:</strong> según si la ley exige una forma determinada para su validez o prueba.</li><li><strong>Nominados / innominados:</strong> según si tienen o no regulación específica.</li></ul></div>
<div class="sub"><h4>Oferta (arts. 972-975 CCyC)</h4><p>La oferta es la manifestación dirigida a persona determinada o determinable, con intención de obligarse y suficiente precisión. La oferta obliga al proponente desde su emisión; puede retractarse antes de que llegue al destinatario. Caduca con la muerte o incapacidad del oferente antes de la aceptación.</p></div>
<div class="sub"><h4>Aceptación (arts. 978-983 CCyC)</h4><p>Para que el contrato se concluya, la aceptación debe expresar la plena conformidad con la oferta. La modificación de la oferta por el aceptante equivale a una contraoferta. Entre presentes: la aceptación debe manifestarse de inmediato. Entre ausentes: el contrato se concluye cuando la aceptación es recibida por el oferente.</p></div>
<div class="sub"><h4>Autonomía de la voluntad y sus límites</h4><p>Las partes son libres para celebrar contratos y determinar su contenido dentro de los límites impuestos por el orden público, la moral y las buenas costumbres. "El contrato válidamente celebrado es obligatorio para las partes."</p></div>`},

{id:'t38',mod:'M3',title:'Contratos de adhesión y de consumo',tags:['Adhesión','Consumo','Cláusulas abusivas'],
summary:`<div class="sub"><h4>Contrato celebrado por adhesión (arts. 984-989 CCyC)</h4><p>Aquel mediante el cual uno de los contratantes adhiere a cláusulas generales predispuestas unilateralmente por la otra parte o por un tercero, sin que el adherente haya participado en su redacción.</p>
<p><strong>Reglas de interpretación:</strong> las cláusulas ambiguas se interpretan a favor del adherente. Son inválidas las cláusulas que:<ul><li>Desnaturalizan las obligaciones del predisponente.</li><li>Imponen al adherente renuncias a derechos o restricciones en la responsabilidad del predisponente.</li><li>Amplían derechos del predisponente en perjuicio del adherente.</li></ul>Las cláusulas sorpresivas o inusitadas que no han podido ser esperadas por el adherente también son nulas.</p></div>
<div class="sub"><h4>Contratos de consumo (arts. 1092-1122 CCyC y LDC)</h4><p>La <strong>relación de consumo</strong> es el vínculo jurídico entre proveedor y consumidor o usuario. El contrato de consumo es aquel celebrado entre un consumidor o usuario final y una persona que actúe profesional u ocasionalmente en calidad de proveedor de bienes o servicios.</p>
<p><strong>Protección del consumidor:</strong> deber de información (precontractual y contractual), trato digno, buena fe, interpretación pro consumidor. Son nulas las cláusulas que limiten la responsabilidad del proveedor, impliquen renuncia de derechos del consumidor, inviertan la carga de la prueba en perjuicio del consumidor.</p></div>`},

{id:'t39',mod:'M3',title:'Contenido del contrato: objeto, causa y forma',tags:['Objeto','Causa','Forma','Prueba'],
summary:`<div class="sub"><h4>Objeto del contrato (arts. 1003-1011 CCyC)</h4><p>Puede ser: bienes (cosas y derechos inmateriales) y hechos (positivos o negativos). Debe ser lícito, posible, determinado o determinable, susceptible de valoración económica y corresponder a un interés de las partes aunque no sea patrimonial. No puede ser un hecho imposible o prohibido por la ley, contrario a la moral, buenas costumbres u orden público, ni lesivo de derechos ajenos.</p></div>
<div class="sub"><h4>Causa del contrato (arts. 1012-1014 CCyC)</h4><ul><li><strong>Causa objetiva:</strong> uniforme para cada tipo contractual; ligada a la función económico-social del tipo (en la compraventa: entrega de la cosa a cambio de un precio).</li><li><strong>Causa subjetiva:</strong> los motivos particulares de las partes que solo son relevantes si son lícitos y se incorporaron expresa o tácitamente al acto como esenciales para ambas partes.</li></ul><p>La <em>causa falsa</em> vicia el acto. La ausencia de causa produce la nulidad del contrato.</p></div>
<div class="sub"><h4>Forma y prueba (arts. 1015-1020 CCyC)</h4><p><strong>Principio de libertad de formas:</strong> si la ley no designa una forma determinada, las partes pueden usar la que estimen conveniente.</p><ul><li><em>Formales solemnes absolutos:</em> la forma es requerida para la validez del acto (donación de inmuebles: escritura pública).</li><li><em>Formales solemnes relativos:</em> si no se cumple la forma, el acto vale como promesa de otorgar el instrumento.</li><li><em>Formales no solemnes:</em> la forma es requerida solo para la prueba.</li></ul><p>La expresión escrita puede ser en cualquier soporte inteligible, incluyendo medios digitales.</p></div>`},

{id:'t40',mod:'M3',title:'Saneamiento, vicios ocultos y evicción',tags:['Saneamiento','Evicción','Vicios ocultos'],
summary:`<div class="sub"><h4>Obligación de saneamiento (arts. 1033-1034 CCyC)</h4><p>Están obligados al saneamiento los transmitentes de bienes a título oneroso y quienes dividen bienes en común. Comprende la obligación de transferir la cosa libre de vicios jurídicos (evicción) y de vicios materiales ocultos (redhibición). La responsabilidad de los garantes es solidaria.</p></div>
<div class="sub"><h4>Responsabilidad por evicción (arts. 1044-1050 CCyC)</h4><p>El garante debe indemnizar al adquirente cuando este es privado total o parcialmente del derecho que adquirió por una causa anterior o contemporánea al acto de transmisión. La evicción puede ser total o parcial. El adquirente debe citar al garante al proceso judicial para que pueda defenderlo.</p></div>
<div class="sub"><h4>Responsabilidad por vicios ocultos / redhibitorios (arts. 1051-1058 CCyC)</h4><p>Defectos ocultos de la cosa que la hacen impropia para su destino o disminuyen su utilidad de tal modo que el adquirente no la habría adquirido o hubiera pagado menos. El defecto debe ser: oculto (no aparente), grave, existente al tiempo de la adquisición. <strong>Acciones:</strong> redhibición (resolución del contrato) o reducción del precio (quanti minoris). <strong>Caducidad:</strong> 3 años para inmuebles y 6 meses para muebles, desde la recepción.</p></div>`},

{id:'t41',mod:'M3',title:'Extinción del contrato',tags:['Rescisión','Resolución','Revocación','Imprevisión'],
summary:`<div class="sub"><h4>Rescisión</h4><ul><li><strong>Bilateral (distracto):</strong> las partes, de común acuerdo, disuelven el contrato. Posible cuando el contrato está en etapa de cumplimiento.</li><li><strong>Unilateral:</strong> cuando la ley o el contrato lo prevén expresamente (ej. locación, mandato).</li></ul></div>
<div class="sub"><h4>Revocación</h4><p>El contrato se extingue por la voluntad unilateral de una de las partes cuando la ley lo autoriza como regla general para ciertos contratos (ej. donación por ingratitud del donatario, mandato). Produce efectos hacia el futuro.</p></div>
<div class="sub"><h4>Resolución</h4><p>Extinción del contrato con efectos retroactivos, por causas sobrevinientes.</p><ul><li><strong>Cláusula resolutoria expresa (pacto comisorio expreso):</strong> opera automáticamente ante el incumplimiento específico previsto. La parte cumplidora debe comunicar su voluntad de resolver.</li><li><strong>Cláusula resolutoria implícita (art. 1087 CCyC):</strong> en los contratos bilaterales el incumplimiento da derecho a la parte cumplidora a resolver. Requiere interpelación previa concediendo plazo no menor de 15 días para que cumpla.</li></ul></div>
<div class="sub"><h4>Frustración del fin y teoría de la imprevisión</h4><ul><li><strong>Frustración del fin (art. 1090):</strong> la finalidad del contrato se frustra por hecho ajeno e imprevisible. La prestación sigue siendo posible materialmente pero carece de sentido para la parte afectada. → Rescisión.</li><li><strong>Imprevisión (art. 1091):</strong> la prestación se torna excesivamente onerosa por alteración extraordinaria e imprevisible de las circunstancias. La parte afectada puede pedir la revisión o la resolución del contrato.</li></ul></div>`},

{id:'t42',mod:'M3',title:'Contratos típicos: compraventa y boleto',tags:['Compraventa','Boleto','Precio','Cosa'],
summary:`<p>La <strong>compraventa</strong> es el contrato por el cual una parte (vendedor) se obliga a transferir la propiedad de una cosa y la otra parte (comprador) a pagar un precio en dinero (arts. 1123 ss. CCyC).</p>
<div class="sub"><h4>Caracteres</h4><ul><li>Bilateral: ambas partes quedan obligadas.</li><li>Oneroso: ambas obtienen ventajas.</li><li>Conmutativo como regla (aleatorio excepcionalmente: ej. compra de cosa futura).</li><li>No formal como regla (la escritura pública se exige para la transmisión del dominio de inmuebles, no para la compraventa en sí).</li></ul></div>
<div class="sub"><h4>La cosa y el precio</h4><p><strong>Cosa:</strong> debe ser determinada o determinable, existente o futura. Cosas ajenas: el vendedor debe procurar la transmisión. <strong>Precio:</strong> debe ser en dinero, serio (no irrisorio), cierto y determinado o determinable. Si solo se fija el precio de una parte y el resto de la cosa es pagado con otro bien, es una permuta si el valor de la cosa supera al del dinero.</p></div>
<div class="sub"><h4>Boleto de compraventa (arts. 1170-1171 CCyC)</h4><p>Acuerdo previo a la escritura pública; crea obligaciones personales entre las partes pero no transfiere el dominio real. <strong>Protección del adquirente:</strong> el adquirente de buena fe que pagó el 25% del precio tiene prioridad frente a acreedores del vendedor en la quiebra, si el boleto tiene fecha cierta anterior a la quiebra.</p></div>`},

{id:'t43',mod:'M3',title:'Locación, obra y mandato',tags:['Locación','Obra','Mandato','Plazos'],

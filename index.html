summary:`<div class="sub"><h4>Locación de cosas (arts. 1187 ss. CCyC)</h4><p>Una parte (locador) cede temporalmente el uso y goce de una cosa a la otra (locatario) a cambio de un precio (locación). <strong>Plazos:</strong> el plazo máximo es de 20 años para destino habitacional y 50 años para otros destinos. <strong>Nota:</strong> la Ley 27.737 (2024) redujo el plazo mínimo legal a <strong>2 años</strong> para todas las locaciones (incluyendo habitacionales), reemplazando el plazo de 3 años que fijaba la ley anterior. <strong>Obligaciones del locador:</strong> entrega de la cosa en buen estado, mantenimiento, pago de expensas extraordinarias. <strong>Obligaciones del locatario:</strong> pago del precio, uso y goce conforme al destino, conservación de la cosa, restitución al vencimiento.</p></div>
<div class="sub"><h4>Contrato de obra y servicio (arts. 1251 ss. CCyC)</h4><p><strong>Distinción:</strong> en la obra, el resultado es un opus (una obra determinada); en el servicio, la promesa es de una actividad. <strong>Sistemas de contratación de obra:</strong> ajuste alzado (precio global fijo), unidad de medida (precio por unidad), coste y costas (el comitente paga los costos más honorarios). <strong>Responsabilidad del contratista:</strong> por los vicios aparentes y ocultos de la obra; por ruina del edificio durante 10 años si causa riesgo a la solidez o seguridad (responsabilidad decenal).</p></div>
<div class="sub"><h4>Mandato (arts. 1319 ss. CCyC)</h4><p>Una parte (mandatario) se obliga a realizar uno o más actos jurídicos en interés de otra (mandante). El mandato siempre conlleva representación. <strong>Mandato irrevocable:</strong> requiere negocio especial, plazo limitado e interés legítimo del mandatario, de un tercero o común. El poder irrevocable subsiste ante la muerte del mandante. <strong>Extinción:</strong> cumplimiento del negocio, revocación del mandante, renuncia del mandatario, muerte o incapacidad de cualquiera de las partes (regla general).</p></div>`},

// ── MÓDULO 4: PROCESAL ─────────────────────
{id:'t44',mod:'M4',title:'El proceso judicial: concepto, caracteres y elementos',tags:['Proceso','Presupuestos','Tipos procesales'],
summary:`<p>El <strong>proceso judicial</strong> es la serie gradual, progresiva y concatenada de actos jurídicos cumplidos por órganos predispuestos por el Estado (tribunales) y por los particulares (partes) para obtener mediante la aplicación de la ley a un hecho concreto la declaración, realización o protección coactiva de los derechos que pretenden tener los particulares.</p>
<div class="sub"><h4>Caracteres</h4><ul><li>Es un <em>instrumento</em> para la realización del derecho material.</li><li>Tiene estructura dinámica: los actos se encadenan de modo que cada uno es efecto del anterior y causa del siguiente.</li><li>Es oficial: se desarrolla ante órganos estatales.</li></ul></div>
<div class="sub"><h4>Presupuestos procesales</h4><p>Son las condiciones mínimas necesarias para que el proceso tenga existencia jurídica y eficacia. <strong>Presupuestos procesales:</strong> competencia del juez, capacidad procesal de las partes, demanda en forma. <strong>Presupuestos sentenciales:</strong> legitimación en la causa, interés para obrar.</p></div>
<div class="sub"><h4>Sistemas procesales</h4><ul><li><strong>Dispositivo:</strong> las partes tienen el señorío del proceso; el juez actúa solo cuando es convocado. Predomina en el proceso civil.</li><li><strong>Inquisitivo:</strong> el juez actúa de oficio; tiene iniciativa probatoria. Predomina en el proceso penal tradicional.</li><li><strong>Acusatorio:</strong> separación entre quien acusa y quien juzga. Sistema constitucional penal argentino.</li><li><strong>Mixto:</strong> combina elementos de los anteriores.</li><li><strong>Oral / escrito:</strong> según la forma predominante de los actos.</li><li><strong>De instancia única o plural:</strong> según las posibilidades de revisión.</li></ul></div>`},

{id:'t45',mod:'M4',title:'Principios procesales',tags:['Principios','Publicidad','Economía','Contradicción'],
summary:`<div class="sub"><h4>Publicidad</h4><p>Los actos del proceso deben ser accesibles no solo para las partes sino también para la comunidad. Garantía democrática del control ciudadano sobre la administración de justicia. Excepciones: menores, secreto sumarial en la investigación penal.</p></div>
<div class="sub"><h4>Inmediación</h4><p>El juez debe estar en contacto directo con las partes y con la producción de la prueba, percibiendo directamente los hechos sin intermediarios. Fundamental en los procesos orales.</p></div>
<div class="sub"><h4>Bilateralidad (contradicción)</h4><p>Nadie puede ser condenado sin ser oído. Cada acto de una parte debe ser comunicado a la otra para que pueda ejercer su derecho de defensa. Es la base del debido proceso.</p></div>
<div class="sub"><h4>Economía procesal</h4><p>Obtener el máximo resultado con el mínimo esfuerzo procesal. Comprende: concentración (reunir la mayor cantidad de actos en el menor número de audiencias), celeridad (tramitar el proceso sin dilaciones innecesarias), saneamiento (facultad del juez de sanear los defectos procesales de oficio).</p></div>
<div class="sub"><h4>Adquisición procesal</h4><p>Una vez que un acto o elemento es incorporado al proceso, pertenece a él y puede ser aprovechado por cualquiera de las partes, independientemente de quién lo haya aportado. También llamado principio de comunidad de la prueba.</p></div>`},

{id:'t46',mod:'M4',title:'Jurisdicción: concepto, caracteres y límites',tags:['Jurisdicción','Poder judicial','Soberanía'],
summary:`<p>La <strong>jurisdicción</strong> es el poder-deber del Estado, derivado de su soberanía, para dirimir conflictos de intereses entre partes a través de órganos adecuados, con el fin de dar efectiva tutela jurídica y restablecer el orden jurídico alterado.</p>
<div class="sub"><h4>Caracteres</h4><ul><li><strong>Pública:</strong> integra el derecho público interno; es ejercida por un poder del Estado.</li><li><strong>Única:</strong> la función de administrar justicia es indivisible aunque su ejercicio se distribuya entre distintos órganos.</li><li><strong>Exclusiva y excluyente:</strong> solo los órganos estatales pueden ejercerla; una vez sometido un asunto a un juez competente, ningún otro puede intervenir.</li><li><strong>Indelegable:</strong> el juez no puede delegar su función en particulares.</li><li><strong>Inderogable:</strong> las partes no pueden sustraer un asunto de la jurisdicción estatal por acuerdo mutuo (salvo la prórroga convencional admitida por ley).</li></ul></div>
<div class="sub"><h4>Límites</h4><ul><li>Sumisión de un diferendo por particulares al órgano específico.</li><li>Existencia de un "caso" o controversia que determine el ámbito material del pronunciamiento.</li><li>Adecuación a los límites legales fijados en abstracto.</li><li>Ámbito geográfico de ejercicio.</li><li>La búsqueda de la verdad está limitada por las reglas procesales y los poderes de las partes en materia probatoria.</li></ul></div>`},

{id:'t47',mod:'M4',title:'Competencia: criterios y competencia federal',tags:['Competencia','Fuero','Competencia federal','Prórroga'],
summary:`<p>La <strong>competencia</strong> es la facultad de un juez para ejercer la jurisdicción en un caso concreto. Distribuye el ejercicio de la jurisdicción entre los distintos órganos judiciales. Debe estar prevista legalmente.</p>
<div class="sub"><h4>Criterios de determinación</h4><ul><li><strong>Por la materia (fuero):</strong> naturaleza de la cuestión jurídica (civil, penal, laboral, familiar, contencioso-administrativo).</li><li><strong>Por el territorio:</strong> domicilio del demandado (forum domicilii), lugar de la cosa (forum rei sitae), lugar de cumplimiento (forum solutionis).</li><li><strong>Por el grado (instancia):</strong> primera, segunda (apelación) o ulterior instancia.</li><li><strong>Por el valor (cuantía):</strong> monto económico del litigio.</li><li><strong>Por el turno:</strong> distribución interna entre jueces de idéntica competencia.</li></ul></div>
<div class="sub"><h4>Prórroga</h4><p>La competencia es en principio improrrogable. Sin embargo, la competencia <em>territorial</em> es prorrogable en materia civil por acuerdo de partes (expresa o tácita). La competencia por materia y grado es improrrogable.</p></div>
<div class="sub"><h4>Competencia federal</h4><p><strong>Caracteres:</strong> de naturaleza pública y origen constitucional; es excepcional; excluye a la justicia ordinaria local. <strong>Criterios:</strong></p><ul><li>Por razón de la materia: causas regidas por la CN, leyes del Congreso y tratados internacionales.</li><li>Por razón de las personas: Estado Nacional, embajadores y cónsules, provincias entre sí, extranjeros vs. argentinos cuando sea distinto el domicilio.</li></ul></div>
<div class="sub"><h4>Fuero de atracción</h4><p>En los procesos universales (sucesiones, concursos), el juez que entiende en ellos atrae a su fuero todas las demandas que tengan contenido patrimonial relacionado con ese proceso.</p></div>`},

{id:'t48',mod:'M4',title:'Acción, pretensión y excepción procesal',tags:['Acción','Pretensión','Excepción','Demanda'],
summary:`<div class="sub"><h4>Acción procesal</h4><p>Poder o facultad abstracta, de carácter constitucional, concedida al justiciable para requerir la tutela de los órganos jurisdiccionales. Es autónoma del derecho sustancial, pública y dinámica. No se agota en el impulso inicial: se extiende hasta la finalización del proceso.</p></div>
<div class="sub"><h4>Pretensión</h4><p>Contenido de la acción procesal: afirmación de un sujeto de derecho de merecer la tutela jurídica. Sus elementos:</p><ul><li><strong>Sujetos:</strong> quien formula (actor/acusador) y frente a quien se formula (demandado/imputado).</li><li><strong>Objeto inmediato:</strong> el pronunciamiento pedido (condena, declaración, constitución). Objeto mediato: el bien de la vida perseguido.</li><li><strong>Causa:</strong> el fundamento fáctico y jurídico de la petición.</li></ul></div>
<div class="sub"><h4>Requisitos según el proceso</h4><ul><li><strong>Civil:</strong> principio dispositivo; la demanda debe individualizar partes, enunciar hechos y derecho, delimitar la cosa pedida y formular la petición.</li><li><strong>Penal:</strong> el Ministerio Público Fiscal actúa por el principio de legalidad para formular la acusación.</li><li><strong>Laboral y familia:</strong> rasgos inquisitivos; posible impulso de oficio.</li></ul></div>
<div class="sub"><h4>Excepción procesal</h4><p>Poder jurídico del demandado o perseguido penalmente para repeler la acción. <strong>Dilatorias:</strong> impiden la sentencia de fondo (incompetencia, falta de personería, litispendencia). <strong>Perentorias:</strong> extinguen el derecho (pago, prescripción, cosa juzgada). La contestación de la demanda: el demandado puede contestar, allanarse, reconvenir, oponer excepciones o quedar en rebeldía.</p></div>`},

{id:'t49',mod:'M4',title:'Sujetos procesales y actos procesales',tags:['Partes','Ministerio Público','Actos procesales','Cargas'],
summary:`<div class="sub"><h4>Sujetos esenciales</h4><ul><li><strong>Tribunal:</strong> tercero imparcial e independiente. En el sistema acusatorio, su función es juzgar sin iniciativa probatoria en el juicio.</li><li><strong>Partes:</strong> duales (siempre hay dos: actor y demandado), antagónicas (intereses contrapuestos), iguales (mismas posibilidades de actuación).</li></ul></div>
<div class="sub"><h4>Sujetos en el proceso penal</h4><ul><li><strong>Ministerio Público Fiscal:</strong> acusador; tiene el poder exclusivo de la acción penal pública; dirige la investigación.</li><li><strong>Querellante particular:</strong> puede actuar junto al Fiscal o en delitos de instancia privada de forma autónoma.</li><li><strong>Actor civil:</strong> víctima del delito que reclama la indemnización dentro del proceso penal.</li><li><strong>Imputado:</strong> polo pasivo; sujeto procesal con derechos autónomos, especialmente el de defensa. No puede ser reducido a mero objeto del proceso.</li></ul></div>
<div class="sub"><h4>Actos procesales</h4><p>Declaraciones de voluntad o de ciencia de los sujetos procesales directamente dirigidas a producir el inicio, desenvolvimiento o terminación del proceso. Elementos: sujeto, objeto, actividad (forma, lugar, tiempo). Clasificación por sujeto (tribunal, partes, terceros) y por función (iniciación, instrucción, conclusión).</p></div>
<div class="sub"><h4>Cargas procesales</h4><p>Requerimientos de conducta de realización facultativa, establecidos en interés del propio sujeto. Su omisión trae consecuencias desfavorables para quien la tiene, sin sanción directa (≠ deber). Ejemplos: carga de comparecer, de contestar la demanda, de ofrecer prueba.</p></div>`},

{id:'t50',mod:'M4',title:'Comunicación procesal y plazos',tags:['Notificación','Plazos','Cédula','Edictos'],
summary:`<div class="sub"><h4>Notificación procesal</h4><p>Acto de hacer conocer una resolución o diligencia judicial a una parte o tercero interesado, garantizando su derecho de defensa. Tipos: citación (comparecer), emplazamiento (actuar dentro de un plazo), requerimiento (imposición de una conducta).</p></div>
<div class="sub"><h4>Sistemas y formas de notificación</h4><ul><li><strong>Por nota (en sede del tribunal):</strong> la parte se notifica automáticamente en días específicos (martes y viernes, como regla en el proceso civil provincial). Es la regla general salvo excepciones.</li><li><strong>Por cédula:</strong> la forma más común de notificación a domicilio; practicada por auxiliares judiciales mediante documento que transcribe la resolución.</li><li><strong>Por edictos:</strong> para personas cuyo domicilio se ignora; publicaciones en diarios.</li><li><strong>Por ministerio de la ley (automática):</strong> opera por el mero transcurso del tiempo, sin necesidad de acto formal.</li><li><strong>Comunicación entre jueces:</strong> oficios (entre jueces del mismo país) y exhortos (entre jueces de distintas jurisdicciones o países).</li></ul></div>
<div class="sub"><h4>Plazos procesales</h4><p><strong>Clasificación por origen:</strong> legales (fijados por la ley), judiciales (establecidos por el juez), convencionales (acordados por las partes). <strong>Por sus efectos:</strong></p><ul><li><em>Perentorios (fatales):</em> fenecen por el solo transcurso del tiempo; el vencimiento produce la preclusión automática de la facultad. Son comunes en sistemas que buscan celeridad.</li><li><em>Ordenatorios:</em> no producen la pérdida automática del derecho; pueden generar apercibimientos. Son prorrogables.</li></ul></div>`},

{id:'t51',mod:'M4',title:'Teoría general de la prueba',tags:['Prueba','Objeto','Medios','Valoración'],
summary:`<p>La <strong>prueba</strong> es el método de averiguación y comprobación de los hechos afirmados en el proceso, para formar la convicción del juez.</p>
<div class="sub"><h4>Objeto de la prueba</h4><p>Los <em>hechos</em> (materiales o inmateriales, físicos o psíquicos) que sirven de presupuesto a las normas jurídicas aplicables. No todos los hechos necesitan prueba: los notorios, los admitidos por ambas partes y los amparados por presunciones legales absolutas están excluidos.</p></div>
<div class="sub"><h4>Medios de prueba</h4><p>Vías legalmente reguladas para introducir el elemento probatorio al proceso: confesional (absolución de posiciones), documental, inspección ocular (reconocimiento judicial), pericial, informativa, testimonial. Los ordenamientos modernos también admiten medios innominados.</p></div>
<div class="sub"><h4>Principios probatorios</h4><ul><li><strong>Unidad:</strong> el conjunto probatorio es un todo examinado globalmente.</li><li><strong>Comunidad (adquisición):</strong> la prueba incorporada pertenece al proceso.</li><li><strong>Igualdad y contradicción (bilateralidad):</strong> iguales oportunidades de ofrecer, producir y controlar la prueba.</li><li><strong>Inmediación:</strong> contacto directo del juez con la prueba.</li><li><strong>Buena fe y lealtad procesal:</strong> conducta honesta en la actividad probatoria.</li></ul></div>
<div class="sub"><h4>Sistemas de valoración de la prueba</h4><ul><li><strong>Prueba legal (tarifa legal):</strong> la ley predetermina el valor de ciertos medios.</li><li><strong>Sana crítica racional:</strong> el juez valora libremente pero con lógica, experiencia y psicología, fundando expresamente la decisión. Es el sistema predominante en los códigos modernos.</li><li><strong>Íntima convicción:</strong> sin fundamentación lógica obligatoria. Se usa en los juicios por jurados.</li></ul></div>`},

{id:'t52',mod:'M4',title:'Carga de la prueba y verdad jurídica objetiva',tags:['Carga probatoria','Onus probandi','Proceso penal'],
summary:`<div class="sub"><h4>Concepción clásica</h4><p>La carga de la prueba recae sobre quien afirma un hecho: el actor prueba su pretensión; el demandado prueba sus excepciones (onus probandi incumbit ei qui dicit). En materia penal: el Estado a través del Fiscal prueba la responsabilidad; el imputado no debe probar su inocencia (principio de inocencia).</p></div>
<div class="sub"><h4>Reformulación: cargas probatorias dinámicas</h4><p>La carga de probar se impone a quien se encuentre en mejores condiciones fácticas o técnicas de producir esa prueba, independientemente de quién haya afirmado el hecho. Fundamento: buena fe y colaboración procesal. Especialmente aplicada en procesos de daños, laborales y de familia donde existe una parte más fuerte que tiene el control de la información.</p></div>
<div class="sub"><h4>Verdad jurídica objetiva</h4><p>Concepción moderna que supera la dicotomía entre verdad formal (proceso civil clásico) y verdad real o material (proceso penal). El juez busca un conocimiento limitado por las reglas procesales, los poderes de las partes y las normas de valoración de la prueba. No es la verdad filosófica sino la que el proceso puede alcanzar respetando las reglas del juego.</p></div>`},

{id:'t53',mod:'M4',title:'Sentencia: requisitos, clasificación y congruencia',tags:['Sentencia','Congruencia','Cosa juzgada','Clasificación'],
summary:`<p>La <strong>sentencia</strong> es el acto procesal conclusivo del órgano judicial que decide actuar o denegar la pretensión o petición que fue objeto del proceso. Modo normal de culminación del proceso.</p>
<div class="sub"><h4>Estructura tripartita</h4><ul><li><strong>Vistos (parte expositiva):</strong> carátula, identificación de las partes, la pretensión y su oposición, trámites sustanciales. Determina los alcances de la cosa juzgada.</li><li><strong>Considerandos (parte motiva):</strong> exposición de los motivos fácticos y jurídicos de la resolución; valoración de la prueba y aplicación del derecho (subsunción). Es la esencia de la sentencia y garantía para el justiciable.</li><li><strong>Resuelvo (parte dispositiva):</strong> la decisión final; conclusión lógica de los fundamentos.</li></ul></div>
<div class="sub"><h4>Clasificación</h4><ul><li>Por la pretensión: declarativas, constitutivas, de condena.</li><li>Por el éxito: estimatorias o desestimatorias.</li><li>Por el recurso: firmes o no firmes.</li><li>Por la instancia: primera, segunda o ulterior instancia.</li></ul></div>
<div class="sub"><h4>Principio de congruencia</h4><p>Identidad jurídica entre lo resuelto y las pretensiones, imputaciones y excepciones aducidas. Incongruencias:</p><ul><li><em>Ultra petita:</em> concede más de lo pedido.</li><li><em>Citra petita:</em> omite expedirse sobre alguna pretensión.</li><li><em>Extra petita:</em> concede algo distinto a lo pedido.</li><li><em>Causal:</em> se basa en una causa distinta a la alegada.</li></ul><p><strong>Jura novit curia:</strong> el juez conoce el derecho y puede aplicar la norma correcta aunque no haya sido invocada por las partes (no puede introducir hechos nuevos).</p></div>`},

{id:'t54',mod:'M4',title:'Cosa juzgada e impugnación procesal',tags:['Cosa juzgada','Recursos','Impugnación','Apelación'],
summary:`<div class="sub"><h4>Cosa juzgada</h4><p>Inmutabilidad de la decisión judicial una vez firme e irrecurrible. Otorga seguridad jurídica. <strong>Triple identidad:</strong> sujeto, objeto y causa. <strong>Clases:</strong></p><ul><li><em>Formal:</em> inmutabilidad dentro del mismo proceso (por agotamiento de recursos). Permite replantear la cuestión en otro proceso más amplio. Se aplica a decisiones provisorias (alimentos provisorios).</li><li><em>Material:</em> inmutabilidad absoluta; impide toda nueva discusión en cualquier proceso. Se aplica a sentencias de conocimiento pleno.</li></ul></div>
<div class="sub"><h4>Impugnación procesal</h4><p>Poder de las partes para buscar la modificación, revocación, anulación o sustitución de un acto procesal ilegal o injusto. Fundamento: garantías constitucionales del juicio previo y la defensa en juicio. <strong>Principios:</strong> congruencia (limitada a los agravios), taxatividad legal (no hay recurso sin ley que lo prevea), bilateralidad, simplificación.</p></div>
<div class="sub"><h4>Recursos ordinarios vs. extraordinarios</h4><ul><li><strong>Apelación:</strong> plena jurisdicción; el tribunal superior reexamina todas las cuestiones de hecho y derecho y puede dictar nueva sentencia.</li><li><strong>Casación:</strong> controla la correcta aplicación del derecho y unifica la jurisprudencia (función nomofiláctica). Solo por causales taxativas contra sentencias definitivas.</li><li><strong>Inconstitucionalidad:</strong> revisa violaciones a principios constitucionales.</li><li><strong>Recurso Extraordinario Federal:</strong> ante la CSJN para garantizar la supremacía de la CN y las leyes federales.</li></ul></div>
<div class="sub"><h4>Efectos de los recursos</h4><ul><li><em>Devolutivo:</em> la competencia pasa al tribunal superior.</li><li><em>Suspensivo:</em> se suspende la ejecución de la resolución impugnada.</li><li><em>Extensivo:</em> el beneficio se extiende a co-litigantes que no recurrieron (si la cuestión es indivisible).</li></ul></div>`},

{id:'t55',mod:'M4',title:'Medidas cautelares y sanciones procesales',tags:['Cautelares','Embargo','Nulidad','Sanciones'],
summary:`<div class="sub"><h4>Medidas cautelares</h4><p>Resoluciones jurisdiccionales provisionales, dictadas normalmente <em>inaudita parte</em>, para evitar el menoscabo inminente de derechos o asegurar la eficacia de una sentencia futura.</p>
<p><strong>Caracteres:</strong> accesoriedad (dependen de un proceso principal), provisionalidad (ligada a la subsistencia del peligro), mutabilidad (pueden modificarse), discrecionalidad judicial, flexibilidad (medidas innominadas posibles).</p>
<p><strong>Requisitos de admisibilidad:</strong></p><ul><li><em>Fumus boni iuris</em> (verosimilitud del derecho): apariencia o probabilidad de que el derecho invocado existe.</li><li><em>Periculum in mora</em> (peligro en la demora): riesgo de que sin la medida el derecho sufra un daño irreparable antes de la sentencia.</li><li><em>Contracautela:</em> garantía del solicitante para responder por los daños que la medida pueda causar a la parte contraria (real, personal o juratoria).</li></ul></div>
<div class="sub"><h4>Sanciones procesales</h4><ul><li><strong>Inadmisibilidad:</strong> impide el ingreso de un acto por incumplimiento de formas o requisitos. Función preventiva.</li><li><strong>Nulidad:</strong> priva al acto de sus efectos jurídicos por defecto formal. Principios: especificidad (debe estar prevista o el acto carecer de su finalidad), convalidación, trascendencia (debe haber perjuicio cierto), protección, conservación.</li><li><strong>Preclusión:</strong> pérdida de una facultad procesal por no ejercerse en el momento oportuno, o por acto incompatible, o por haber agotado una fase.</li><li><strong>Caducidad de instancia (perención):</strong> conclusión anormal del proceso por inactividad de quien debe impulsar durante el plazo legal. No afecta el derecho sustancial.</li></ul></div>`}
];

const QUIZ=[
// M1
{mod:'M1',q:'¿Cuál es la diferencia entre poder constituyente originario y derivado?',opts:['El originario reforma la Constitución; el derivado la crea','El originario es ilimitado y funda el Estado; el derivado está limitado por el procedimiento y la materia del art. 30 CN','El originario lo ejerce el Congreso; el derivado, la Corte Suprema','Ambos son ejercidos por el pueblo pero en distintos momentos históricos'],c:1,exp:'El poder constituyente originario no tiene límites jurídicos previos porque es el que funda el ordenamiento. El derivado opera dentro de los límites del art. 30 CN: procedimiento especial (declaración por 2/3 del Congreso + Convención Constituyente) y límites materiales implícitos (cláusulas pétreas).'},
{mod:'M1',q:'¿Cuántos instrumentos internacionales de DDHH adquirieron jerarquía constitucional con la reforma de 1994?',opts:['7','11','5','15'],c:1,exp:'El art. 75 inc. 22 CN incorporó 11 instrumentos al bloque de constitucionalidad: CADH, PIDCP, PIDESC, DUDH, DADDH, Convención contra el Genocidio, Convención contra la Tortura, CEDAW, CDN, Convención sobre Discriminación Racial, y la Convención sobre personas con discapacidad fue incorporada posteriormente.'},
{mod:'M1',q:'¿Qué órgano realiza efectivamente la reforma constitucional en Argentina?',opts:['El Congreso por mayoría de 2/3','La Corte Suprema de Justicia','Una Convención Constituyente especialmente elegida','El Poder Ejecutivo por DNU en casos de urgencia'],c:2,exp:'Según el art. 30 CN, el Congreso solo DECLARA la necesidad de la reforma (con 2/3 de cada Cámara) y fija el temario. La reforma es llevada a cabo por una Convención Constituyente especialmente convocada y elegida, que debe circunscribirse al temario fijado.'},
{mod:'M1',q:'El sistema argentino de control de constitucionalidad es…',opts:['Concentrado y erga omnes','Difuso e inter partes (como regla general)','Concentrado e inter partes','Difuso y erga omnes'],c:1,exp:'En Argentina cualquier juez puede declarar la inconstitucionalidad (sistema difuso), pero la declaración solo produce efectos para las partes del caso concreto (inter partes), sin derogar la norma del ordenamiento.'},
{mod:'M1',q:'¿Qué materias están expresamente prohibidas para los DNU?',opts:['Materia penal, tributaria, electoral y régimen de partidos políticos','Materia ambiental, laboral, previsional y electoral','Solo materia penal y electoral','Cualquier materia que requiera 2/3 de votos en el Congreso'],c:0,exp:'El art. 99 inc. 3 CN establece que los DNU no pueden regular materia penal, tributaria, electoral ni el régimen de los partidos políticos. Estas materias siempre deben seguir el procedimiento legislativo ordinario.'},
{mod:'M1',q:'Las competencias concurrentes en el federalismo argentino son aquellas que…',opts:['Solo puede ejercer el Gobierno federal','Solo pueden ejercer las provincias','Pueden ejercer tanto el Gobierno federal como las provincias, prevaleciendo la norma federal ante conflicto','Requieren el acuerdo previo de ambos niveles de gobierno para su ejercicio'],c:2,exp:'Las competencias concurrentes (ej. educación, ambiente, bienestar general) pueden ser ejercidas por ambos niveles de gobierno. Ante conflicto entre norma federal y provincial, prevalece la norma federal en virtud del principio de supremacía del art. 31 CN.'},
{mod:'M1',q:'El hábeas corpus correctivo procede…',opts:['Ante amenazas inminentes a la libertad física de una persona en libertad','Para recuperar la libertad de quien fue detenido ilegalmente','Contra toda forma ilegítima que agrave la condición de quien está legalmente privado de libertad','Cuando la persona fue sacada de sus jueces naturales'],c:2,exp:'El hábeas corpus correctivo tutela las condiciones de detención de quien ya está legalmente privado de libertad. Procede cuando las condiciones de detención son ilegítimamente agravantes (torturas, malas condiciones, afectación de derechos dentro de la detención legal).'},
{mod:'M1',q:'¿Cuáles son los requisitos para ser elegido Presidente de la Nación?',opts:['Haber nacido en territorio argentino (o ser hijo de nativo), tener las calidades para ser senador, y haber ejercido la ciudadanía por al menos 6 años','Solo ser argentino nativo y mayor de 30 años','Ser argentino nativo, mayor de 35 años y tener 6 años de ciudadanía en ejercicio','Haber nacido en territorio argentino (o ser hijo de nativo) y tener las demás calidades exigidas para ser senador'],c:3,exp:'Tras la reforma de 1994, los requisitos del art. 89 CN son: haber nacido en el territorio argentino o ser hijo de ciudadano nativo habiendo nacido en país extranjero, más las demás calidades para ser senador (ser argentino, tener 30 años, 6 años de ciudadanía en ejercicio y ser natural de la provincia que lo elija o con 2 años de residencia inmediata en ella). Se eliminó el requisito de pertenecer a la comunión católica.'},
{mod:'M1',q:'¿Quién designa a los jueces de la Corte Suprema de Justicia de la Nación?',opts:['El Consejo de la Magistratura mediante concurso público','El Presidente de la Nación con acuerdo del Senado por 2/3 de sus miembros en sesión pública','El Congreso mediante votación conjunta de ambas Cámaras','El Presidente de la Nación con acuerdo del Consejo de la Magistratura'],c:1,exp:'El art. 99 inc. 4 CN establece que el Presidente nombra a los magistrados de la Corte Suprema con acuerdo del Senado por dos tercios de sus miembros presentes en sesión pública convocada al efecto. Para los jueces inferiores, interviene previamente el Consejo de la Magistratura (terna vinculante).'},
{mod:'M1',q:'El amparo colectivo del art. 43 CN puede ser promovido por…',opts:['Solo el afectado directo','El afectado, el Defensor del Pueblo y las asociaciones registradas que propendan a los fines del caso','Cualquier ciudadano en representación del pueblo','Solo el Ministerio Público o el Defensor del Pueblo'],c:1,exp:'El segundo párrafo del art. 43 CN amplía la legitimación activa para el amparo en defensa de derechos que protegen el ambiente, la competencia, al usuario y al consumidor, y de derechos de incidencia colectiva: el afectado, el Defensor del Pueblo y las asociaciones registradas. No cualquier ciudadano puede promoverlo.'},
// M2
{mod:'M2',q:'¿Cuándo se aplica la retroactividad de la ley penal?',opts:['Siempre que la nueva ley sea más severa, para fortalecer la disuasión','Solo cuando el imputado lo solicita expresamente al tribunal','Cuando la ley posterior es más benigna para el imputado, incluso ante sentencia firme','Solo antes del dictado de la sentencia condenatoria'],c:2,exp:'El principio de retroactividad benigna establece que siempre se aplica la ley más favorable al imputado. Esto opera incluso si ya existe sentencia condenatoria firme: si la ley posterior es más benigna, debe aplicarse (ej. se reduce la pena cumplida). Es la "constante prevalencia de la ley más benigna".'},
{mod:'M2',q:'El dolo eventual se diferencia de la culpa consciente en que…',opts:['En el dolo eventual el autor ignora el riesgo; en la culpa consciente lo conoce','En el dolo eventual el autor acepta el resultado como posible; en la culpa consciente confía en que no ocurrirá','Son sinónimos: ambos implican la no intención directa del resultado','En el dolo eventual el resultado siempre ocurre; en la culpa consciente no'],c:1,exp:'La diferencia está en la actitud frente al resultado probable. En el dolo eventual, el autor se lo representa y lo acepta (teoría del asentimiento: "aunque ocurra, sigo actuando"). En la culpa consciente, el autor también se representa la posibilidad pero confía en poder evitarla (no lo acepta).'},
{mod:'M2',q:'¿Qué requisito distingue a la complicidad necesaria de la no necesaria?',opts:['La complicidad necesaria requiere acuerdo previo con el autor; la no necesaria es espontánea','En la complicidad necesaria el partícipe ejecuta parte del delito; en la no necesaria solo ayuda','La complicidad necesaria es aquella sin la cual el delito no hubiera podido cometerse; la no necesaria es la cooperación secundaria','La distinción radica en si el cómplice estaba presente o ausente durante la ejecución'],c:2,exp:'El art. 46 CP distingue la complicidad por la relevancia del aporte. La complicidad necesaria (art. 45) es la cooperación sin la cual el hecho no hubiera podido cometerse, equiparada penalmente al autor. La no necesaria (art. 46) es la ayuda que, aunque útil, no era indispensable, con escala penal reducida.'},
{mod:'M2',q:'¿Cuándo opera el estado de necesidad justificante (y no exculpante)?',opts:['Cuando el mal causado es igual al evitado','Cuando el mal causado es mayor al evitado pero había urgencia extrema','Cuando el mal causado es menor al mal evitado','Siempre que exista una situación de peligro para la propia persona'],c:2,exp:'El estado de necesidad justificante elimina la antijuridicidad cuando el mal causado (daño al bien jurídico ajeno) es MENOR que el mal evitado (bien jurídico propio protegido). La valoración se hace con base en las escalas penales. Si el mal causado es igual o mayor, puede operar el estado de necesidad exculpante.'},
{mod:'M2',q:'¿Qué es la imputación objetiva del resultado?',opts:['La atribución de responsabilidad penal al superior jerárquico por los actos de sus subordinados','Una teoría normativa que determina si un resultado puede ser atribuido al tipo objetivo del autor, exigiendo que sea la realización de un riesgo no permitido creado por su conducta','La imputación basada exclusivamente en el nexo causal entre la acción y el resultado','La responsabilidad objetiva por el resultado producido, sin necesidad de dolo o culpa'],c:1,exp:'La imputación objetiva es una teoría normativa que va más allá de la causalidad. No basta que la conducta haya causado el resultado; también es necesario que el resultado sea la realización de un riesgo no permitido creado por el autor. Criterios: creación de riesgo prohibido, realización de ese riesgo en el resultado, ámbito de protección de la norma.'},
{mod:'M2',q:'El desistimiento voluntario en la tentativa…',opts:['Solo exime de pena si el delito no pudo consumarse por causas externas','Exime de pena por tentativa cuando el autor abandona espontáneamente la ejecución; responde por los actos ya consumados','Exime de toda responsabilidad penal, incluso por los daños causados durante la tentativa','Solo opera si el autor avisa a la autoridad antes de que el delito se consume'],c:1,exp:'El desistimiento voluntario exime de pena por tentativa (el iter criminis no punible retrocede). Para ser válido debe ser espontáneo: no basta que el autor no pueda continuar o tema ser descubierto. El autor sigue respondiendo por los delitos ya consumados durante la tentativa (ej. daños materiales causados al intentar el robo).'},
{mod:'M2',q:'¿Cuál es la penalidad en el concurso ideal de delitos?',opts:['Se suman todas las penas correspondientes a cada tipo','Se aplica la pena menor para favorecer al imputado','Se aplica solamente la pena mayor prevista para los tipos en conflicto','Se aplica la mitad de la suma de todas las penas'],c:2,exp:'El art. 54 CP establece que en el concurso ideal (un hecho que cae bajo más de un tipo penal) se aplica solo la pena mayor. Es el principio de absorción: la pena mayor absorbe a las menores. Se diferencia del concurso real, donde rige la acumulación.'},
{mod:'M2',q:'¿Cuándo no hay "acción" en sentido penal?',opts:['Cuando el autor actúa sin dolo','Cuando el resultado es imprevisto','Cuando falta el control voluntario: actos reflejos, estado de inconsciencia completa o fuerza física irresistible (vis absoluta)','Cuando el autor es menor de 16 años'],c:2,exp:'La ausencia de acción (y por tanto, de delito posible) se produce cuando falta el dominio voluntario de la conducta: actos reflejos (estornudo, convulsión), estados de inconsciencia completa (sonambulismo profundo, coma), y fuerza física irresistible (vis absoluta: alguien mueve la mano de otro). No se trata de inimputabilidad (categoría posterior en el análisis).'},
{mod:'M2',q:'El exceso en la legítima defensa (art. 35 CP) tiene como consecuencia…',opts:['La plena justificación del acto, igual que la legítima defensa completa','La aplicación de la pena del delito doloso correspondiente sin reducción','La aplicación de la pena fijada para el delito culposo correspondiente','La impunidad total porque hay voluntad de defensa'],c:2,exp:'El art. 35 CP establece que cuando se exceden los límites impuestos por la ley, la autoridad o la necesidad (ej. en la legítima defensa, el estado de necesidad), se aplica la pena fijada para el delito culposo correspondiente. Esto implica una reducción significativa respecto de la pena del delito doloso.'},
// M3
{mod:'M3',q:'¿A qué edad se adquiere el discernimiento para actos lícitos según el CCyC?',opts:['10 años','14 años','13 años','18 años'],c:2,exp:'El art. 261 CCyC establece que no tienen discernimiento para los actos lícitos los menores de 13 años. Por lo tanto, el discernimiento para actos lícitos se adquiere a los 13 años. Para los actos ilícitos, el límite es 10 años. Esto es independiente de la mayoría de edad (18 años).'},
{mod:'M3',q:'¿Cuándo procede declarar la INCAPACIDAD (y no solo la capacidad restringida) de una persona?',opts:['Cuando padece cualquier enfermedad mental diagnosticada','Cuando es mayor de 70 años y su salud se deterioró','Solo cuando se encuentra absolutamente imposibilitada de interactuar con su entorno y manifestar su voluntad, y el sistema de apoyos es ineficaz','Cuando administra mal sus bienes y perjudica a su familia'],c:2,exp:'El CCyC establece una regla muy restrictiva para la declaración de incapacidad: solo procede cuando la persona está absolutamente imposibilitada de interactuar con su entorno y expresar su voluntad por cualquier modo, y el sistema de apoyos resulte ineficaz. En todos los demás casos, corresponde la declaración de capacidad restringida con designación de apoyos.'},
{mod:'M3',q:'La inoponibilidad de la personalidad jurídica (corrimiento del velo) procede cuando…',opts:['La persona jurídica tiene pérdidas reiteradas que perjudican a los socios','La persona jurídica es usada para violar la ley, el orden público, la buena fe o defraudar derechos de terceros','Un socio contrae deudas personales que no puede pagar con su propio patrimonio','El objeto social de la empresa cambia sin autorización del registro correspondiente'],c:1,exp:'El art. 144 CCyC permite la inoponibilidad de la personalidad jurídica cuando esta se utiliza para encubrir fines ilícitos, violar la ley o el orden público, actuar de mala fe o frustrar derechos de terceros. Su aplicación es restrictiva: no opera ante simples dificultades económicas de la sociedad.'},
{mod:'M3',q:'¿Cuál es la diferencia entre frutos y productos de una cosa?',opts:['Los frutos son naturales; los productos, industriales','Los frutos no alteran la sustancia de la cosa madre; los productos sí la disminuyen o modifican al ser extraídos','Los frutos se extraen una sola vez; los productos pueden extraerse periódicamente','No hay diferencia práctica entre ambos conceptos en el CCyC'],c:1,exp:'La diferencia clave es si la extracción afecta la sustancia de la cosa madre. Los frutos (naturales, industriales o civiles) no alteran la sustancia de la cosa: la vaca sigue siendo vaca después de dar crías; el terreno sigue siendo terreno después de la cosecha. Los productos sí disminuyen o alteran la sustancia: extraer minerales, petróleo o arena agota o reduce la cosa.'},
{mod:'M3',q:'El dolo esencial se diferencia del dolo incidental porque…',opts:['El dolo esencial proviene del propio contratante; el incidental puede provenir de un tercero','El dolo esencial es causa eficiente del acto (sin él no se hubiera celebrado) y produce nulidad; el incidental no es determinante y solo produce indemnización','El dolo esencial requiere maniobras físicas; el incidental puede ser verbal','El dolo esencial es el que tiene el vendedor; el incidental es el del comprador'],c:1,exp:'El dolo esencial reúne todos los requisitos: es grave, determinante del acto (causa eficiente: sin él el damnificado no habría celebrado el acto), causó daño relevante y no fue recíproco. Su efecto es la nulidad del acto + indemnización. El dolo incidental no cumple alguno de esos requisitos y solo da derecho a indemnización, sin nulidad.'},
{mod:'M3',q:'¿Qué es la lesión como vicio del acto jurídico?',opts:['Es el daño físico sufrido por una parte durante la negociación del contrato','Es la desproporción injustificada de prestaciones combinada con la explotación de la necesidad, debilidad psíquica o inexperiencia de una parte','Es el incumplimiento de obligaciones que causa pérdidas económicas a la otra parte','Es el error esencial que lleva a una parte a pagar más de lo que vale la cosa'],c:1,exp:'La lesión (art. 332 CCyC) requiere dos elementos: objetivo (desproporción evidentemente injustificada de las prestaciones) + subjetivo (explotación por parte del lesionante de la necesidad, debilidad psíquica o inexperiencia del lesionado). Ambos elementos deben concurrir. Las acciones son nulidad del acto o reajuste equitativo del convenio.'},
{mod:'M3',q:'¿Cuál es el efecto de la nulidad absoluta respecto de terceros de buena fe a título oneroso?',opts:['La nulidad absoluta siempre afecta a todos, incluidos los terceros de buena fe','Los terceros de buena fe a título oneroso están protegidos: no pueden verse afectados por la nulidad','Los terceros de buena fe solo están protegidos si adquirieron el bien antes de que se iniciara la acción de nulidad','La nulidad relativa protege a los terceros; la absoluta nunca'],c:1,exp:'El CCyC protege a los subadquirentes de buena fe y a título oneroso frente a los efectos de la nulidad. Si el bien pasó a manos de un tercero que actuó de buena fe y pagó un precio justo, la restitución se hace imposible y los participantes del acto nulo deben indemnizar al perjudicado.'},
{mod:'M3',q:'En la compraventa, ¿cuándo hay permuta en lugar de compraventa?',opts:['Cuando el precio no está en dinero sino en bienes','Cuando el valor de la cosa entregada supera el valor del dinero pagado','Cuando se intercambian bienes sin que haya dinero de ningún tipo','Cuando el precio es parcialmente en dinero y parcialmente en bienes, y el valor de los bienes supera al del dinero'],c:3,exp:'Si una parte paga parte del precio en dinero y parte con otra cosa, y el valor de la cosa (bien entregado) supera al del dinero, el contrato es una permuta. Si el valor del dinero es igual o mayor al de la cosa, es una compraventa (art. 1126 CCyC). El elemento diferenciador es qué componente tiene mayor valor.'},
{mod:'M3',q:'¿Cuál es el plazo mínimo legal para la locación con destino habitacional vigente?',opts:['3 años (Ley 27.551)','2 años (Ley 27.737, vigente desde 2024)','6 meses','1 año'],c:1,exp:'La Ley 27.737 (sancionada en 2024) redujo el plazo mínimo de locación a 2 años para todos los contratos de locación, incluyendo los de destino habitacional. Anteriormente, la Ley 27.551 había fijado el mínimo en 3 años. El plazo máximo sigue siendo 20 años para destino habitacional y 50 años para otros destinos.'},
{mod:'M3',q:'¿Cuándo opera la teoría de la imprevisión?',opts:['Cuando una de las partes incumple el contrato por causas ajenas a su voluntad','Cuando la prestación se torna excesivamente onerosa por una alteración extraordinaria e imprevisible de las circunstancias, ajena a las partes y que supera el riesgo asumido','Cuando el objeto del contrato se destruye antes de la entrega','Cuando hay un error esencial sobre las condiciones del mercado al momento de contratar'],c:1,exp:'La imprevisión (art. 1091 CCyC) requiere: alteración EXTRAORDINARIA de las circunstancias (no cualquier variación), IMPREVISIBLE al momento de contratar, AJENA a las partes, y que SUPERE el riesgo normalmente asumido. No se aplica a contratos aleatorios respecto de hechos propios de su aleatoriedad, ni cuando quien la invoca ya estuviera en mora.'},
// M4
{mod:'M4',q:'¿Cuál es la diferencia entre legitimación ad processum y ad causam?',opts:['La ad processum es para iniciar el proceso; la ad causam para continuarlo','La ad processum es la capacidad procesal para comparecer en juicio; la ad causam es la titularidad del derecho material debatido','La ad processum la tiene el abogado; la ad causam la tiene la parte','Son sinónimos: ambas se refieren a la capacidad para actuar en el proceso'],c:1,exp:'La legitimación ad processum (procesal) es la capacidad genérica de comparecer en juicio y realizar actos procesales con efectos jurídicos. La legitimación ad causam (sustancial) es la identidad entre quien reclama y el titular del derecho material invocado (o contra quien se reclama y el sujeto pasivo de la relación jurídica). La primera es un presupuesto procesal; la segunda, de la pretensión.'},
{mod:'M4',q:'La competencia por razón de la MATERIA es…',opts:['Prorrogable por acuerdo de partes','Delegable entre jueces de la misma materia','De orden público e improrrogable; el juez debe inhibirse de oficio si no es competente por razón de materia','Solo puede ser cuestionada por el demandado, no por el actor'],c:2,exp:'La competencia por razón de materia es de orden público: no puede ser prorrogada ni por el acuerdo expreso ni por la conducta omisiva de las partes (no oposición de excepción). El juez debe inhibirse de oficio en cualquier estado del proceso. A diferencia, la competencia territorial sí puede ser prorrogada convencionalmente en materia civil.'},
{mod:'M4',q:'¿Qué es el principio de congruencia en la sentencia?',opts:['La obligación del juez de dictar sentencia dentro del plazo legal','La identidad jurídica entre lo resuelto y las pretensiones, imputaciones y excepciones aducidas por las partes','La obligación del juez de fundar su decisión en la ley y la jurisprudencia de la Corte','La garantía de que ambas partes tienen igual tiempo para presentar sus argumentos'],c:1,exp:'El principio de congruencia exige que la sentencia se pronuncie sobre todo lo pedido y solo sobre lo pedido. La incongruencia se clasifica en ultra petita (concede más de lo pedido), citra petita (omite pronunciarse sobre algo), extra petita (concede algo no pedido) y causal (se apoya en una causa no invocada). El principio jura novit curia no habilita al juez a introducir hechos nuevos.'},
{mod:'M4',q:'¿Cuál es la diferencia entre cosa juzgada formal y material?',opts:['La formal es la de primera instancia; la material es la de segunda instancia','La formal implica inmutabilidad dentro del proceso, pero permite replantear en otro proceso; la material implica inmutabilidad absoluta en cualquier proceso','La formal protege al demandante; la material protege al demandado','La formal requiere triple identidad; la material solo requiere identidad de objeto'],c:1,exp:'La cosa juzgada formal es la inmutabilidad de la decisión dentro del proceso por agotamiento de los recursos (pero puede replantearse en otro proceso más amplio o con distinto objeto). La cosa juzgada material es la inmutabilidad absoluta que impide replantear la cuestión en cualquier otro proceso posterior (requiere triple identidad: sujeto, objeto, causa).'},
{mod:'M4',q:'Los tres requisitos para que el juez otorgue una medida cautelar son…',opts:['Demanda presentada, sentencia favorable y depósito de garantía','Verosimilitud del derecho, peligro en la demora y contracautela','Notificación previa al demandado, urgencia acreditada y garantía real','Sentencia firme, pedido de parte y peligro de insolvencia del deudor'],c:1,exp:'Para dictar una medida cautelar deben concurrir: (1) fumus boni iuris (verosimilitud del derecho invocado: apariencia de que el derecho existe), (2) periculum in mora (peligro de que sin la medida el derecho sufra un daño irreparable antes de la sentencia), y (3) contracautela (garantía del solicitante para responder por los daños que la medida cause si resulta injustificada).'},
{mod:'M4',q:'¿Cuál es la función principal del recurso de casación?',opts:['Revisar los hechos del caso para dictar una nueva sentencia más justa','Controlar la correcta aplicación del derecho por los tribunales inferiores y unificar la jurisprudencia (función nomofiláctica)','Obtener la declaración de inconstitucionalidad de normas aplicadas en la sentencia','Revisar la prueba producida en primera instancia que no fue valorada correctamente'],c:1,exp:'El recurso de casación tiene dos funciones clásicas: la nomofiláctica (mantener la ley en su interpretación uniforme, controlando que los jueces inferiores la apliquen correctamente) y la uniformadora (unificar la jurisprudencia). No hay reexamen de hechos: es un recurso de derecho puro. Solo procede por causales taxativas contra sentencias definitivas.'},
{mod:'M4',q:'¿Qué es la preclusión procesal?',opts:['La obligación del juez de pronunciarse sobre todas las cuestiones planteadas','La pérdida o extinción de una facultad procesal por no haberse ejercido en el momento oportuno, o por haber realizado un acto incompatible','La prohibición de replantear en apelación lo que no fue planteado en primera instancia','La nulidad que opera automáticamente por el mero vencimiento del plazo'],c:1,exp:'La preclusión es uno de los principios que garantizan el avance y la conclusión del proceso. Puede operar por: (1) no ejercer la facultad en el plazo perentorio, (2) realizar un acto incompatible con la facultad (ej. contestar la demanda sin oponer excepción de incompetencia implica preclusión de esa defensa), o (3) haber agotado una fase del proceso.'},
{mod:'M4',q:'En el sistema acusatorio penal argentino, ¿quién tiene el poder de la acción penal pública?',opts:['El juez, quien puede investigar y juzgar','El querellante particular, quien actúa en nombre de la víctima','El Ministerio Público Fiscal, que dirige la investigación y formula la acusación','La policía judicial, que reúne las pruebas y decide si acusar'],c:2,exp:'En el sistema acusatorio (que busca implementar el CPPN y los nuevos códigos provinciales), el Ministerio Público Fiscal tiene el monopolio de la acción penal pública. El juez es un tercero imparcial que no investiga; decide. En el juicio, el Fiscal asume la posición de parte actora que debe probar la culpabilidad. El juez no puede condenar sin acusación.'},
{mod:'M4',q:'¿Qué sistema de valoración de la prueba es el predominante en los códigos procesales modernos argentinos?',opts:['Prueba legal o tarifa legal','Sana crítica racional','Íntima convicción','Sistema mixto: tarifa para documentos y sana crítica para testimonios'],c:1,exp:'La sana crítica racional exige que el juez valore la prueba de forma libre pero fundada: aplicando las reglas de la lógica, los principios de la psicología y la experiencia común, y explicando expresamente las razones de su convencimiento. Es el sistema predominante en los códigos procesales modernos, tanto civiles como penales. La prueba legal opera solo para ciertos medios (ej. instrumentos públicos).'},
{mod:'M4',q:'¿Qué es el fuero de atracción y cuándo opera?',opts:['Es la competencia que tiene el fuero federal para atraer causas que normalmente corresponderían a la justicia provincial','Es el fenómeno por el cual en los procesos universales (sucesiones, concursos/quiebras), el juez que entiende en ellos atrae a su fuero todas las demandas patrimoniales relacionadas','Es la facultad del Tribunal Supremo de avocarse a cualquier causa de interés federal','Es la competencia especial que tiene el fuero laboral para conocer en todo conflicto vinculado al trabajo'],c:1,exp:'El fuero de atracción opera en los procesos universales donde se ventila la totalidad del patrimonio de una persona (sucesiones, concursos preventivos, quiebras). El juez que entiende en ese proceso universal atrae a su competencia todas las demandas de contenido patrimonial relacionadas, evitando sentencias contradictorias sobre el mismo patrimonio.'},
// más M1
{mod:'M1',q:'¿Qué es el Ministerio Público según el art. 120 CN?',opts:['El cuarto poder del Estado, junto al Legislativo, Ejecutivo y Judicial','Un órgano del Poder Judicial que representa al Estado en los juicios','Un órgano extrapoderes con independencia funcional y autarquía financiera, que promueve la actuación de la justicia en defensa de la legalidad','Una dependencia del Poder Ejecutivo que coordina la política criminal del Estado'],c:2,exp:'El art. 120 CN incorporado en 1994 configura al Ministerio Público como un órgano extrapoderes: no pertenece a ninguno de los tres poderes clásicos aunque está vinculado a la administración de justicia. No es un "cuarto poder" en el sentido de suma de poder. Su independencia funcional implica que no recibe instrucciones del Ejecutivo ni del Judicial.'},
{mod:'M1',q:'El Jurado de Enjuiciamiento tiene competencia para…',opts:['Remover a los jueces de la Corte Suprema','Remover a los jueces de los tribunales inferiores de la Nación, siendo sus fallos irrecurribles','Juzgar al Presidente de la Nación por mal desempeño','Evaluar la idoneidad de los candidatos a magistrados antes de su designación'],c:1,exp:'El art. 115 CN establece que los jueces de los tribunales inferiores de la Nación son removidos por el Jurado de Enjuiciamiento a pedido del Consejo de la Magistratura. Sus fallos son irrecurribles. Los jueces de la Corte Suprema son removidos por el mecanismo del juicio político (Diputados acusa, Senado juzga).'},
// más M3
{mod:'M3',q:'¿Cuál es la diferencia entre simulación absoluta y simulación relativa?',opts:['En la absoluta el acto perjudica a un tercero; en la relativa solo perjudica a las partes','En la absoluta el acto aparente no oculta ningún acto real; en la relativa el acto aparente oculta un acto real distinto','La absoluta es la que constan en escritura pública; la relativa en documento privado','En la absoluta participan solo las partes; en la relativa también un tercero interpuesto'],c:1,exp:'La simulación absoluta: el acto es completamente ficticio, no hay ningún acto real detrás (ej. se simula una venta pero en realidad la cosa no se transfiere ni se paga precio). La simulación relativa: el acto aparente encubre un acto real diferente (ej. se simula una venta cuando en realidad es una donación, para eludir impuestos o perjudicar herederos).'},
{mod:'M3',q:'¿Qué es el boleto de compraventa y qué protección especial tiene?',opts:['Es la escritura pública que transfiere el dominio del inmueble y no requiere protección especial','Es un acuerdo previo a la escritura que crea obligaciones personales pero no transfiere el dominio; el adquirente de buena fe que pagó el 25% tiene prioridad frente a acreedores del vendedor en la quiebra','Es equivalente a la escritura pública para la transferencia de dominio si tiene fecha cierta','Es el contrato privado de compraventa que solo es oponible entre las partes, sin efectos frente a terceros'],c:1,exp:'El boleto de compraventa crea obligaciones entre las partes (dar escritura, pagar el precio) pero no transfiere el dominio real del inmueble (que requiere escritura pública + inscripción registral). El art. 1171 CCyC protege al adquirente de buena fe que pagó al menos el 25% del precio: tiene prioridad frente a acreedores del vendedor en la quiebra si el boleto tiene fecha cierta anterior a la quiebra.'},
// más M2
{mod:'M2',q:'¿Cuál es la diferencia entre autor mediato y coautor?',opts:['El autor mediato actúa solo; el coautor actúa con otros','El autor mediato controla a otro como instrumento (quien ejecuta actúa sin dolo, bajo coacción o es inimputable); el coautor comparte el dominio funcional del hecho con otro u otros coautores que actúan con plena responsabilidad','El autor mediato siempre está presente en la ejecución; el coautor puede estar ausente','El autor mediato tiene más pena que el coautor'],c:1,exp:'En la autoría mediata, el "hombre de atrás" domina la voluntad del ejecutor, quien actúa como instrumento: no sabe que delinque (error), actúa bajo coacción o es inimputable. En la coautoría, todos los coautores actúan con plena culpabilidad y comparten el dominio funcional del hecho: hay acuerdo común, división de roles, y cada uno es imprescindible para el plan.'},
{mod:'M2',q:'¿Qué distingue al delito continuado del concurso real?',opts:['En el delito continuado hay un solo hecho; en el concurso real hay varios hechos independientes','En el delito continuado hay pluralidad de actos pero con una única resolución criminal que los unifica; en el concurso real los hechos son independientes entre sí','En el delito continuado se aplica la pena mayor; en el concurso real se suman las penas','El delito continuado solo puede cometerse por el mismo sujeto; el concurso real puede involucrar a distintas personas'],c:1,exp:'El delito continuado (creación doctrinal y jurisprudencial) requiere: pluralidad de actos + unidad de resolución criminal que los conecte + homogeneidad objetiva + mismo bien jurídico + proximidad temporal. Aunque hay varios actos, se tratan como una unidad típica (es más benigno que el concurso real). En el concurso real, cada hecho es independiente: cada uno tiene su propia resolución criminal.'},
// más M4
{mod:'M4',q:'¿Cuál es el efecto del vencimiento de un plazo PERENTORIO (fatal)?',opts:['El juez puede conceder una prórroga si hay causa justificada','Solo produce la pérdida del derecho si la contraparte lo pide expresamente','La facultad procesal se extingue automáticamente (preclusión) por el solo transcurso del tiempo, sin necesidad de declaración judicial','El acto puede realizarse fuera del plazo pero con una multa procesal'],c:2,exp:'Los plazos perentorios (también llamados "fatales") producen la preclusión de la facultad procesal por el solo transcurso del tiempo: no requieren declaración del juez ni pedido de la contraparte. Vencido el plazo, el derecho a realizar el acto queda extinguido. Se diferencian de los plazos ordenatorios, cuyo vencimiento no extingue automáticamente la facultad.'},
{mod:'M4',q:'¿En qué consiste la nulidad procesal y cuáles son sus principios?',opts:['Es la ineficacia de un acto procesal por defecto formal; principios: especificidad, convalidación, trascendencia (perjuicio), protección y conservación','Es la misma nulidad del derecho civil aplicada al proceso; solo opera si la parte afectada la invoca dentro del plazo de 5 días','Es una sanción que anula todo lo actuado en el proceso cuando hay un error fundamental','Es la declaración de inhabilidad del proceso completo por vicio en la demanda inicial'],c:0,exp:'La nulidad procesal priva al acto de sus efectos por defecto formal. Sus principios: especificidad (debe estar prevista por la ley o el acto debe carecer de su finalidad), convalidación (puede sanearse por consentimiento de la parte afectada), trascendencia (debe haber causado un perjuicio real e irreparable), protección (quien causó el defecto no puede invocarlo), conservación (se prefiere la validez del acto si cumple su finalidad).'}
];
